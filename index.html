// === 弹窗系统 ===
function showModal(title, defaultText, onSave) {
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h4>${title}</h4>
      <textarea id="modalTextarea">${escHtml(defaultText)}</textarea>
      <div class="modal-btns">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="modalSaveBtn">保存</button>
      </div>
    </div>
  </div>`;
  const ta = document.getElementById('modalTextarea');
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
  document.getElementById('modalSaveBtn').onclick = () => {
    const v = ta.value.trim();
    if(!v) { showToast('内容不能为空','warning'); return; }
    onSave(v);
    closeModal();
  };
}

function showConfirm(title, message, onConfirm) {
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h4>${title}</h4>
      <div style="font-size:14px;line-height:1.6;">${message}</div>
      <div class="modal-btns">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn" style="background:var(--danger);color:#fff;" id="modalConfirmBtn">删除</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalConfirmBtn').onclick = () => {
    onConfirm();
    closeModal();
  };
}

function closeModal() {
  document.getElementById('modalRoot').innerHTML = '';
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = type==='success'?'#34a853':type==='warning'?'#f9ab00':'#1a73e8';
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 2500);
}

// === 诊断逻辑（结构化5维分析）===
// 返回 { pricePower, exposure, storeRedeem, storeComplete, activity, overview } 每个维度含 items[] 和 status
function diagnoseBrand(b, acts, med) {
  const result = {
    pricePower: { title:'价格力', icon:'💰', items:[], value: pctSigned(b.pricePower), median: pctSigned(med.medianPricePower), status:'ok' },
    exposure: { title:'高低频应曝尽曝率', icon:'📡', items:[], status:'ok',
      metrics: [
        { label:'高频应曝尽曝率', value: pct(b.highFreqExposureRate), median: pct(med.medianHighFreqRate), ok: b.highFreqExposureRate >= med.medianHighFreqRate },
        { label:'低频应曝尽曝率', value: pct(b.lowFreqExposureRate), median: pct(med.medianLowFreqRate), ok: b.lowFreqExposureRate >= med.medianLowFreqRate }
      ]
    },
    storeRedeem: { title:'到店未核销', icon:'🏪', items:[], status:'ok',
      metrics: [
        { label:'到店核销率', value: pct(b.storeRedeemRate), median: pct(med.medianStoreRedeemRate), ok: b.storeRedeemRate >= med.medianStoreRedeemRate },
        { label:'未达门槛率', value: pct(b.unreachedThresholdRate), threshold:'10%', ok: b.unreachedThresholdRate <= 0.1 }
      ]
    },
    storeComplete: { title:'门店/商户号完整度', icon:'🔗', items:[], status:'ok',
      metrics: [
        { label:'门店完整度', value: pct(b.storeCompleteness), threshold:'80%', ok: b.storeCompleteness >= 0.8 },
        { label:'商户号完整度', value: b.merchantCompleteness ? pct(b.merchantCompleteness) : '-', threshold:'95%', ok: !b.merchantCompleteness || b.merchantCompleteness >= 0.95 }
      ]
    },
    activity: { title:'活动信息', icon:'📋', items:[], status:'ok' }
  };

  // 价格力
  if(b.pricePower < 0) {
    result.pricePower.status = 'bad';
    result.pricePower.items.push(`价格力${pctSigned(b.pricePower)}，为负值，货盘竞争力不足，低于同品类均值`);
  } else if(b.pricePower < med.medianPricePower) {
    result.pricePower.status = 'warn';
    result.pricePower.items.push(`价格力${pctSigned(b.pricePower)}，低于中位数${pctSigned(med.medianPricePower)}，优惠力度偏弱`);
  } else {
    result.pricePower.items.push(`价格力${pctSigned(b.pricePower)}，高于中位数${pctSigned(med.medianPricePower)}，货盘有竞争力`);
  }

  // 高低频应曝尽曝（反映老客曝光占比，关注罗盘分层合理性）
  if(b.highFreqExposureRate < med.medianHighFreqRate) {
    result.exposure.status = 'bad';
    result.exposure.items.push(`高频用户应曝尽曝率${pct(b.highFreqExposureRate)}，低于中位数${pct(med.medianHighFreqRate)}——老客获得的曝光不够充分，建议排查罗盘人群分层设置`);
  } else {
    result.exposure.items.push(`高频用户应曝尽曝率${pct(b.highFreqExposureRate)}，高于中位数，老客曝光占比较高，有利于转化`);
  }
  if(b.lowFreqExposureRate < med.medianLowFreqRate) {
    if(result.exposure.status!=='bad') result.exposure.status = 'warn';
    result.exposure.items.push(`低频用户应曝尽曝率${pct(b.lowFreqExposureRate)}，低于中位数${pct(med.medianLowFreqRate)}——老客曝光仍有提升空间，可检查罗盘分层配置`);
  } else {
    result.exposure.items.push(`低频用户应曝尽曝率${pct(b.lowFreqExposureRate)}，高于中位数，老客曝光覆盖到位`);
  }

  // 到店未核销
  if(b.storeRedeemRate < med.medianStoreRedeemRate) {
    result.storeRedeem.status = 'bad';
    result.storeRedeem.items.push(`到店核销率${pct(b.storeRedeemRate)}，低于中位数${pct(med.medianStoreRedeemRate)}，用户到店后转化流失较多`);
    result.storeRedeem.items.push(`7日到店${fmt(b.totalVisit7d||0)}人，其中达门槛${fmt(b.reachedThreshold7d||0)}人、未达门槛${fmt(b.unreachedThreshold7d||0)}人`);
    result.storeRedeem.items.push(`<strong>排查方向：</strong>①小程序核券体验，是否引导会员注册和用券 ②门店POS机核销，店员是否培训核券流程 ③是否存在更优惠货盘 ④是否存在优先用券逻辑（如优先核销到期时间更近的券）`);
  } else {
    result.storeRedeem.items.push(`到店核销率${pct(b.storeRedeemRate)}，高于中位数，用户到店转化强`);
    result.storeRedeem.items.push(`7日到店${fmt(b.totalVisit7d||0)}人，其中达门槛${fmt(b.reachedThreshold7d||0)}人、未达门槛${fmt(b.unreachedThreshold7d||0)}人`);
  }
  if(b.unreachedThresholdRate > 0.1) {
    if(result.storeRedeem.status!=='bad') result.storeRedeem.status = 'warn';
    result.storeRedeem.items.push(`未达门槛率${pct(b.unreachedThresholdRate)}，超过10%用户到店后因未达门槛无法核销`);
  } else {
    result.storeRedeem.items.push(`未达门槛率${pct(b.unreachedThresholdRate)}，门槛设置合理`);
  }

  // 门店/商户号完整度
  if(b.storeCompleteness < 0.8) {
    result.storeComplete.status = 'bad';
    result.storeComplete.items.push(`门店完整度${pct(b.storeCompleteness)}，偏低，可能有门店未上线或数据缺失`);
  } else {
    result.storeComplete.items.push(`门店完整度${pct(b.storeCompleteness)}，覆盖充分`);
  }
  if(b.merchantCompleteness && b.merchantCompleteness < 0.95) {
    if(result.storeComplete.status!=='bad') result.storeComplete.status = 'warn';
    result.storeComplete.items.push(`商户号完整度${pct(b.merchantCompleteness)}，部分商户号未绑定`);
  } else if(b.merchantCompleteness) {
    result.storeComplete.items.push(`商户号完整度${pct(b.merchantCompleteness)}，绑定完整`);
  }

  // 活动
  const wholeStoreActs = acts.filter(a=>a.isWholeStore===1);
  const lowThresholdWhole = wholeStoreActs.filter(a=>a.thresholdJudge==='低于笔单价');
  if(lowThresholdWhole.length>0) {
    result.activity.status = 'good';
    result.activity.items.push(`${lowThresholdWhole.length}个全场券门槛低于客单价(¥${acts[0]?.brandAvgPrice||'-'})，有利于用户到店后核销转化`);
  } else if(wholeStoreActs.length>0) {
    result.activity.status = 'warn';
    result.activity.items.push(`存在${wholeStoreActs.length}个全场券活动，需关注是否稀释转化`);
  }
  if(acts.length===0) {
    result.activity.status = 'bad';
    result.activity.items.push('当前无在跑活动，缺少流量入口');
  } else {
    result.activity.items.push(`当前在跑${acts.length}个活动`);
  }

  return result;
}

function analyzeGoodCase(b, med) {
  const result = {
    pricePower: { title:'价格力', icon:'💰', items:[], value: pctSigned(b.pricePower), median: pctSigned(med.medianPricePower), status:'ok' },
    exposure: { title:'高低频应曝尽曝率', icon:'📡', items:[], status:'ok',
      metrics: [
        { label:'高频应曝尽曝率', value: pct(b.highFreqExposureRate), median: pct(med.medianHighFreqRate), ok: b.highFreqExposureRate >= med.medianHighFreqRate },
        { label:'低频应曝尽曝率', value: pct(b.lowFreqExposureRate), median: pct(med.medianLowFreqRate), ok: b.lowFreqExposureRate >= med.medianLowFreqRate }
      ]
    },
    storeRedeem: { title:'到店未核销', icon:'🏪', items:[], status:'ok',
      metrics: [
        { label:'到店核销率', value: pct(b.storeRedeemRate), median: pct(med.medianStoreRedeemRate), ok: b.storeRedeemRate >= med.medianStoreRedeemRate },
        { label:'未达门槛率', value: pct(b.unreachedThresholdRate), threshold:'10%', ok: b.unreachedThresholdRate <= 0.1 }
      ]
    },
    storeComplete: { title:'门店/商户号完整度', icon:'🔗', items:[], status:'ok',
      metrics: [
        { label:'门店完整度', value: pct(b.storeCompleteness), threshold:'80%', ok: b.storeCompleteness >= 0.8 },
        { label:'商户号完整度', value: b.merchantCompleteness ? pct(b.merchantCompleteness) : '-', threshold:'95%', ok: !b.merchantCompleteness || b.merchantCompleteness >= 0.95 }
      ]
    },
    activity: { title:'活动信息', icon:'📋', items:[], status:'ok' }
  };

  // 价格力
  if(b.pricePower > med.medianPricePower) {
    result.pricePower.status = 'good';
    result.pricePower.items.push(`价格力${pctSigned(b.pricePower)}，高于中位数${pctSigned(med.medianPricePower)}，货盘优惠力度有竞争力`);
  } else {
    result.pricePower.items.push(`价格力${pctSigned(b.pricePower)}，与中位数${pctSigned(med.medianPricePower)}持平或略低`);
  }

  // 高低频应曝尽曝（反映老客曝光占比）
  if(b.highFreqExposureRate > med.medianHighFreqRate) {
    result.exposure.status = 'good';
    result.exposure.items.push(`高频用户应曝尽曝率${pct(b.highFreqExposureRate)}，高于中位数${pct(med.medianHighFreqRate)}，老客曝光占比较高，有助于拉升转化`);
  } else {
    result.exposure.items.push(`高频用户应曝尽曝率${pct(b.highFreqExposureRate)}，接近或略低于中位数，可关注罗盘分层配置`);
  }
  if(b.lowFreqExposureRate > med.medianLowFreqRate) {
    if(result.exposure.status!=='good') result.exposure.status = 'good';
    result.exposure.items.push(`低频用户应曝尽曝率${pct(b.lowFreqExposureRate)}，高于中位数${pct(med.medianLowFreqRate)}，老客曝光覆盖充分`);
  } else {
    result.exposure.items.push(`低频用户应曝尽曝率${pct(b.lowFreqExposureRate)}，接近或略低于中位数，可关注罗盘分层配置`);
  }

  // 到店核销
  if(b.storeRedeemRate > med.medianStoreRedeemRate) {
    result.storeRedeem.status = 'good';
    result.storeRedeem.items.push(`到店核销率${pct(b.storeRedeemRate)}，高于中位数${pct(med.medianStoreRedeemRate)}，用户到店转化强`);
  } else {
    result.storeRedeem.items.push(`到店核销率${pct(b.storeRedeemRate)}，接近或略低于中位数`);
  }
  result.storeRedeem.items.push(`7日到店${fmt(b.totalVisit7d||0)}人，其中达门槛${fmt(b.reachedThreshold7d||0)}人、未达门槛${fmt(b.unreachedThreshold7d||0)}人`);
  if(b.unreachedThresholdRate <= 0.03) {
    result.storeRedeem.items.push(`未达门槛率仅${pct(b.unreachedThresholdRate)}，门槛设置合理，用户核销顺畅`);
  } else {
    result.storeRedeem.items.push(`未达门槛率${pct(b.unreachedThresholdRate)}`);
  }

  // 门店完整度
  if(b.storeCompleteness >= 0.95) {
    result.storeComplete.status = 'good';
    result.storeComplete.items.push(`门店完整度${pct(b.storeCompleteness)}，门店覆盖充分`);
  } else {
    result.storeComplete.items.push(`门店完整度${pct(b.storeCompleteness)}`);
  }
  if(b.merchantCompleteness) {
    result.storeComplete.items.push(`商户号完整度${pct(b.merchantCompleteness)}${b.merchantCompleteness>=0.95?'，绑定完整':'，部分未绑定'}`);
  }

  // 活动
  if(b.activityCount >= 3) {
    result.activity.status = 'good';
    result.activity.items.push(`当前在跑${b.activityCount.toFixed(0)}个活动`);
  } else if(b.activityCount > 0) {
    result.activity.items.push(`当前在跑${b.activityCount.toFixed(0)}个活动`);
  } else {
    result.activity.items.push('当前活动较少');
  }

  return result;
}


// ============================================================
// 分渠道曝光核销环比模块（v4：波动优先+分类汇总+贡献度分析）
// ============================================================
function buildChannelBreakdownSection(ownerFilter, overall) {
  // 根据是否有负责人筛选，聚合对应数据
  let ch, gdTotExp, gdTotWrt, gdPtotExp, gdPtotWrt;

  if(!ownerFilter) {
    const gd = CHANNEL_DATA.globalData;
    ch = gd.channels;
    gdTotExp = gd.totExp;
    gdTotWrt = gd.totWrt;
    gdPtotExp = gd.ptotExp;
    gdPtotWrt = gd.ptotWrt;
  } else {
    // 按负责人聚合：汇总该负责人名下品牌的分渠道数据
    const ownerBrandNames = DATA.assignments.filter(a=>a.owner===ownerFilter).map(a=>a.brand);
    const bcd = CHANNEL_DATA.brandChannelData;
    const chNames = ['商业支付','面对面','固定入口','周边','支付有礼','其他'];
    ch = {};
    chNames.forEach(c => { ch[c] = {exp:0, wrt:0, pExp:0, pWrt:0}; });
    gdTotExp = 0; gdTotWrt = 0; gdPtotExp = 0; gdPtotWrt = 0;
    ownerBrandNames.forEach(bn => {
      const bd = bcd[bn];
      if(!bd) return;
      gdTotExp += bd.totExp||0;
      gdTotWrt += bd.totWrt||0;
      gdPtotExp += bd.ptotExp||0;
      gdPtotWrt += bd.ptotWrt||0;
      chNames.forEach(c => {
        const d = (bd.chData||{})[c]||{};
        ch[c].exp += d.exp||0;
        ch[c].wrt += d.wrt||0;
        ch[c].pExp += d.pExp||0;
        ch[c].pWrt += d.pWrt||0;
      });
    });
  }

  function qoqVal(a,b) { return (b&&b!==0) ? (a-b)/b*100 : null; }
  function fmtW(v) { return (v||0).toFixed(1)+'w'; }
  function fmtN(v) { return Math.round(v||0).toLocaleString(); }
  function calcRateNum(wrt, exp) { return exp>0 ? wrt/(exp*10000)*100 : 0; }
  function qoqBadge(v) {
    if(v===null||v===undefined) return '<span style="color:#94a3b8;font-size:11px;">—</span>';
    const color = v>=0 ? '#16a34a' : '#dc2626';
    const arrow = v>=0 ? '▲' : '▼';
    return '<span style="color:'+color+';font-size:12px;font-weight:700;">'+arrow+(v>=0?'+':'')+v.toFixed(1)+'%</span>';
  }
  function rateDeltaBadge(cur, prev) {
    const d = cur - prev;
    if(prev===0 && cur===0) return '<span style="color:#94a3b8;font-size:11px;">—</span>';
    const color = d>=0 ? '#16a34a' : '#dc2626';
    return '<span style="color:'+color+';font-size:12px;font-weight:700;">'+(d>=0?'+':'')+d.toFixed(2)+'pp</span>';
  }

  // 二选一子渠道
  const eff2x1Names = ['商业支付','面对面','固定入口','其他'];
  const c2x1 = {exp:0, wrt:0, pExp:0, pWrt:0};
  eff2x1Names.forEach(c => {
    const d = ch[c]||{exp:0,wrt:0,pExp:0,pWrt:0};
    c2x1.exp += d.exp||0; c2x1.wrt += d.wrt||0;
    c2x1.pExp += d.pExp||0; c2x1.pWrt += d.pWrt||0;
  });
  const zbCh = ch['周边']||{exp:0,wrt:0,pExp:0,pWrt:0};

  // 支付有礼：直接从渠道数据读取
  const payRewardRaw = ch['支付有礼']||{exp:0,wrt:0,pExp:0,pWrt:0};
  const payReward = {
    exp: payRewardRaw.exp||0,
    wrt: payRewardRaw.wrt||0,
    pExp: payRewardRaw.pExp||0,
    pWrt: payRewardRaw.pWrt||0
  };

  // 全渠道总量（含支付有礼）
  const totExp = gdTotExp;
  const totWrt = gdTotWrt;
  const ptotExp = gdPtotExp;
  const ptotWrt = gdPtotWrt;

  // 各类占比（分母为全渠道总量）
  const expShare2x1 = totExp>0 ? c2x1.exp/totExp*100 : 0;
  const expShareZb = totExp>0 ? zbCh.exp/totExp*100 : 0;
  const expSharePay = totExp>0 ? payReward.exp/totExp*100 : 0;
  const wrtShare2x1 = totWrt>0 ? c2x1.wrt/totWrt*100 : 0;
  const wrtShareZb = totWrt>0 ? zbCh.wrt/totWrt*100 : 0;
  const wrtSharePay = totWrt>0 ? payReward.wrt/totWrt*100 : 0;

  // 曝光核销率
  const c2x1Rate = calcRateNum(c2x1.wrt, c2x1.exp);
  const c2x1PRate = calcRateNum(c2x1.pWrt, c2x1.pExp);
  const zbRate = calcRateNum(zbCh.wrt, zbCh.exp);
  const zbPRate = calcRateNum(zbCh.pWrt, zbCh.pExp);
  const totRate = calcRateNum(totWrt, totExp);
  const ptotRate = calcRateNum(ptotWrt, ptotExp);

  // 上期占比
  const pExpShare2x1 = ptotExp>0 ? c2x1.pExp/ptotExp*100 : 0;
  const pExpShareZb = ptotExp>0 ? zbCh.pExp/ptotExp*100 : 0;
  const pExpSharePay = ptotExp>0 ? payReward.pExp/ptotExp*100 : 0;

  let out = '';
  out += '<div style="background:#fff;border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow-md);border:1px solid var(--border);">';
  out += '<div style="font-size:16px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px;"><span style="width:4px;height:20px;background:var(--purple);border-radius:2px;display:inline-block;"></span><span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--purple);color:#fff;font-size:11px;font-weight:700;margin-right:4px;">2</span>渠道概览</div>';

  // ═══ 整体表现概览行（从原独立卡片合并而来） ═══
  const ov = overall || {};
  out += '<div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">';
  // 曝光量
  out += '<div style="flex:1;min-width:160px;padding:12px 16px;background:linear-gradient(135deg,#eff6ff,#f8faff);border-radius:10px;border:1px solid #e0ecff;">';
  out += '<div style="font-size:11px;color:#64748b;margin-bottom:2px;">📡 整体曝光</div>';
  out += '<div style="font-size:20px;font-weight:800;color:#1e293b;">'+fmtW(totExp)+'</div>';
  const totalExpDelta = totExp - ptotExp;
  const expDeltaColor = totalExpDelta>=0 ? '#16a34a' : '#dc2626';
  out += '<div style="font-size:10px;margin-top:2px;"><span style="color:'+expDeltaColor+';font-weight:700;">'+(totalExpDelta>=0?'+':'')+totalExpDelta.toFixed(1)+'w</span> <span style="color:#b0b8c4;">上期 '+fmtW(ptotExp)+'</span></div>';
  out += '</div>';
  // 核销量
  out += '<div style="flex:1;min-width:160px;padding:12px 16px;background:linear-gradient(135deg,#f0fdf4,#f8fdf8);border-radius:10px;border:1px solid #d1fae5;">';
  out += '<div style="font-size:11px;color:#64748b;margin-bottom:2px;">🎯 整体核销</div>';
  out += '<div style="font-size:20px;font-weight:800;color:#1e293b;">'+fmtN(totWrt)+'</div>';
  const totWrtDelta = ptotWrt>0 ? (totWrt-ptotWrt)/ptotWrt*100 : null;
  out += '<div style="font-size:10px;margin-top:2px;">'+qoqBadge(totWrtDelta)+' <span style="color:#b0b8c4;">上期 '+fmtN(ptotWrt)+'</span></div>';
  out += '</div>';
  // 核销率
  out += '<div style="flex:1;min-width:160px;padding:12px 16px;background:linear-gradient(135deg,#faf5ff,#fdfaff);border-radius:10px;border:1px solid #ede9fe;">';
  out += '<div style="font-size:11px;color:#64748b;margin-bottom:2px;">📈 曝光核销率</div>';
  out += '<div style="font-size:20px;font-weight:800;color:#1e293b;">'+totRate.toFixed(2)+'%</div>';
  out += '<div style="font-size:10px;margin-top:2px;">'+rateDeltaBadge(totRate, ptotRate)+' <span style="color:#b0b8c4;">上期 '+ptotRate.toFixed(2)+'%</span></div>';
  out += '</div>';
  out += '</div>';

  // ═══ 曝光占比分布（核心视觉） ═══
  // 渠道数据准备
  const chRows = [
    {label:'摇一摇（二选一）', color:'#2563eb', d:c2x1, pct:expShare2x1, pPct:pExpShare2x1, inverse:false},
    {label:'周边（非二选一）', color:'#ea580c', d:zbCh, pct:expShareZb, pPct:pExpShareZb, inverse:true},
    {label:'支付有礼', color:'#7c3aed', d:payReward, pct:expSharePay, pPct:pExpSharePay, inverse:false}
  ].filter(r => r.d.exp > 0 || r.d.wrt > 0);

  const maxPct = Math.max(...chRows.map(r=>Math.max(r.pct,r.pPct,1)));

  out += '<div style="background:#f8fafc;border-radius:10px;padding:16px 20px;margin-bottom:16px;">';
  out += '<div style="font-size:13px;font-weight:700;color:#334155;margin-bottom:14px;">分渠道对比</div>';

  // 表头
  out += '<div style="display:flex;align-items:center;padding:0 0 8px 0;border-bottom:1px solid #e2e8f0;margin-bottom:6px;font-size:10px;font-weight:600;color:#94a3b8;">';
  out += '<div style="width:130px;flex-shrink:0;">渠道</div>';
  out += '<div style="flex:2;text-align:center;">曝光占比</div>';
  out += '<div style="flex:1;text-align:center;">曝光量</div>';
  out += '<div style="flex:1;text-align:center;">核销量</div>';
  out += '<div style="flex:1;text-align:center;">核销率</div>';
  out += '</div>';

  chRows.forEach((row, idx) => {
    const d = row.d;
    const expQ = qoqVal(d.exp, d.pExp);
    const wrtQ = qoqVal(d.wrt, d.pWrt);
    const curRate = calcRateNum(d.wrt, d.exp);
    const prevRate = calcRateNum(d.pWrt, d.pExp);
    const pctDelta = row.pct - row.pPct;
    const pctDeltaColor = pctDelta>0 ? '#16a34a' : (pctDelta<0 ? '#dc2626' : '#94a3b8');
    const isNew = d.pExp<=0 && d.exp>0;
    const curW = Math.max(row.pct/maxPct*100, row.pct>0?4:0);
    const prevW = Math.max(row.pPct/maxPct*100, row.pPct>0?4:0);

    if(idx>0) out += '<div style="height:1px;background:#f1f5f9;margin:4px 0;"></div>';

    // 本期行
    out += '<div style="display:flex;align-items:center;gap:4px;padding:6px 0 2px 0;">';
    // 渠道名
    out += '<div style="width:130px;flex-shrink:0;display:flex;align-items:center;gap:5px;">';
    out += '<span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+row.color+';flex-shrink:0;"></span>';
    out += '<span style="font-size:12px;font-weight:700;color:#1e293b;">'+row.label+'</span>';
    out += '</div>';
    // 曝光占比条（核心视觉）
    out += '<div style="flex:2;display:flex;align-items:center;gap:5px;">';
    out += '<div style="flex:1;height:18px;background:#e2e8f0;border-radius:4px;overflow:hidden;">';
    out += '<div style="width:'+curW+'%;height:100%;background:'+row.color+';border-radius:4px;transition:width 0.5s;"></div>';
    out += '</div>';
    out += '<span style="font-size:13px;font-weight:800;color:'+row.color+';min-width:44px;text-align:right;">'+row.pct.toFixed(1)+'%</span>';
    if(!isNew) {
      out += '<span style="font-size:10px;font-weight:600;color:'+pctDeltaColor+';min-width:40px;">'+(pctDelta>=0?'+':'')+pctDelta.toFixed(1)+'pp</span>';
    } else {
      out += '<span style="font-size:10px;font-weight:600;color:#7c3aed;min-width:40px;">新增</span>';
    }
    out += '</div>';
    // 曝光量
    out += '<div style="flex:1;text-align:center;">';
    out += '<span style="font-size:12px;font-weight:700;color:#1e293b;">'+fmtW(d.exp)+'</span>';
    out += '<br><span style="font-size:10px;color:'+(expQ!==null?(expQ>=0?'#16a34a':'#dc2626'):'#94a3b8')+';font-weight:600;">'+(isNew?'新增':qoqBadge(expQ))+'</span>';
    out += '</div>';
    // 核销量
    out += '<div style="flex:1;text-align:center;">';
    out += '<span style="font-size:12px;font-weight:700;color:#1e293b;">'+fmtN(d.wrt)+'</span>';
    out += '<br><span style="font-size:10px;">'+qoqBadge(wrtQ)+'</span>';
    out += '</div>';
    // 核销率
    out += '<div style="flex:1;text-align:center;">';
    out += '<span style="font-size:12px;font-weight:700;color:#1e293b;">'+curRate.toFixed(2)+'%</span>';
    out += '<br><span style="font-size:10px;">'+rateDeltaBadge(curRate, prevRate)+'</span>';
    out += '</div>';
    out += '</div>';

    // 上期行（灰色弱化）
    out += '<div style="display:flex;align-items:center;gap:4px;padding:0 0 4px 0;">';
    out += '<div style="width:130px;flex-shrink:0;padding-left:15px;"><span style="font-size:10px;color:#94a3b8;">上期</span></div>';
    // 上期占比条
    out += '<div style="flex:2;display:flex;align-items:center;gap:5px;">';
    out += '<div style="flex:1;height:10px;background:#e2e8f0;border-radius:3px;overflow:hidden;">';
    if(row.pPct>0) out += '<div style="width:'+prevW+'%;height:100%;background:'+row.color+';opacity:0.3;border-radius:3px;"></div>';
    out += '</div>';
    out += '<span style="font-size:10px;color:#94a3b8;min-width:44px;text-align:right;">'+(row.pPct>0?row.pPct.toFixed(1)+'%':'—')+'</span>';
    out += '<span style="min-width:40px;"></span>';
    out += '</div>';
    // 上期曝光量
    out += '<div style="flex:1;text-align:center;font-size:10px;color:#94a3b8;">'+fmtW(d.pExp)+'</div>';
    // 上期核销量
    out += '<div style="flex:1;text-align:center;font-size:10px;color:#94a3b8;">'+fmtN(d.pWrt)+'</div>';
    // 上期核销率
    out += '<div style="flex:1;text-align:center;font-size:10px;color:#94a3b8;">'+prevRate.toFixed(2)+'%</div>';
    out += '</div>';
  });

  // 支付有礼新增提示
  if(pExpSharePay <= 0 && expSharePay > 0) {
    const payAbsExp = payReward.exp;
    const otherChannelGrowth = totalExpDelta - payAbsExp;
    out += '<div style="margin-top:10px;padding:8px 12px;background:#f5f3ff;border-left:3px solid #7c3aed;border-radius:0 6px 6px 0;font-size:11px;color:#6d28d9;line-height:1.6;">';
    out += '<strong>📌 新增渠道</strong>：支付有礼为本期新增（'+fmtW(payAbsExp)+'），占比 '+expSharePay.toFixed(1)+'%。';
    if(otherChannelGrowth >= 0) {
      out += '其他渠道曝光同样增长 '+otherChannelGrowth.toFixed(1)+'w，整体曝光是增量扩展而非此消彼长。';
    } else {
      out += '其他渠道曝光减少 '+Math.abs(otherChannelGrowth).toFixed(1)+'w，支付有礼对其他渠道占比有稀释效应。';
    }
    out += '</div>';
  }
  out += '</div>';

  // ═══ 子渠道明细表（统一灰色调，弱化差异） ═══
  out += '<div style="margin-top:4px;">';
  out += '<div style="font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:8px;letter-spacing:0.5px;">子渠道明细</div>';
  out += '<div style="overflow-x:auto;">';
  out += '<table style="width:100%;border-collapse:collapse;font-size:12px;">';
  out += '<thead><tr style="background:#f8fafc;">';
  out += '<th style="text-align:left;padding:8px 12px;font-weight:600;color:#64748b;font-size:11px;border-bottom:1px solid #e2e8f0;">渠道</th>';
  out += '<th style="text-align:center;padding:8px 8px;font-weight:600;color:#64748b;font-size:11px;border-bottom:1px solid #e2e8f0;">曝光量</th>';
  out += '<th style="text-align:center;padding:8px 8px;font-weight:600;color:#64748b;font-size:11px;border-bottom:1px solid #e2e8f0;">环比</th>';
  out += '<th style="text-align:center;padding:8px 8px;font-weight:600;color:#64748b;font-size:11px;border-bottom:1px solid #e2e8f0;">核销量</th>';
  out += '<th style="text-align:center;padding:8px 8px;font-weight:600;color:#64748b;font-size:11px;border-bottom:1px solid #e2e8f0;">环比</th>';
  out += '<th style="text-align:center;padding:8px 8px;font-weight:600;color:#64748b;font-size:11px;border-bottom:1px solid #e2e8f0;">核销率</th>';
  out += '<th style="text-align:center;padding:8px 8px;font-weight:600;color:#64748b;font-size:11px;border-bottom:1px solid #e2e8f0;">环比</th>';
  out += '<th style="text-align:center;padding:8px 8px;font-weight:600;color:#64748b;font-size:11px;border-bottom:1px solid #e2e8f0;">曝光占比</th>';
  out += '</tr></thead><tbody>';

  // 渲染子渠道行（统一样式，不区分颜色）
  function renderSubRow(name, d, opts) {
    const expQ = qoqVal(d.exp, d.pExp);
    const wrtQ = qoqVal(d.wrt, d.pWrt);
    const curRate = calcRateNum(d.wrt, d.exp);
    const prevRate = calcRateNum(d.pWrt, d.pExp);
    const expPct = totExp>0 ? d.exp/totExp*100 : 0;
    const anomaly = opts && opts.anomaly;
    const isGroupLabel = opts && opts.isGroupLabel;

    let r = '<tr style="border-bottom:1px solid #f1f5f9;'+(isGroupLabel?'background:#f8fafc;':'')+ '">';
    // 渠道名 - 统一用同一种灰色小圆点
    r += '<td style="padding:7px 12px;text-align:left;'+(isGroupLabel?'':'padding-left:24px;')+'">';
    if(isGroupLabel) {
      r += '<span style="font-size:12px;font-weight:700;color:#475569;">'+name+'</span>';
    } else {
      r += '<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:#94a3b8;margin-right:6px;vertical-align:middle;"></span>';
      r += '<span style="font-size:12px;font-weight:500;color:#475569;">'+name+'</span>';
    }
    r += '</td>';
    // 曝光量（本期为主，上期小字附注）
    r += '<td style="padding:7px 8px;text-align:center;"><span style="font-weight:600;color:#1e293b;">'+fmtW(d.exp)+'</span><span style="color:#b0b8c4;font-size:10px;margin-left:3px;">/ '+fmtW(d.pExp)+'</span></td>';
    r += '<td style="padding:7px 8px;text-align:center;">'+qoqBadge(expQ)+'</td>';
    // 核销量
    r += '<td style="padding:7px 8px;text-align:center;"><span style="font-weight:600;color:#1e293b;">'+fmtN(d.wrt)+'</span><span style="color:#b0b8c4;font-size:10px;margin-left:3px;">/ '+fmtN(d.pWrt)+'</span></td>';
    r += '<td style="padding:7px 8px;text-align:center;">'+qoqBadge(wrtQ)+'</td>';
    // 核销率
    if(anomaly) {
      r += '<td style="padding:7px 8px;text-align:center;color:#94a3b8;font-size:11px;">口径异常</td>';
      r += '<td style="padding:7px 8px;text-align:center;color:#94a3b8;font-size:11px;">—</td>';
    } else {
      r += '<td style="padding:7px 8px;text-align:center;"><span style="font-weight:600;color:#1e293b;">'+curRate.toFixed(2)+'%</span><span style="color:#b0b8c4;font-size:10px;margin-left:3px;">/ '+prevRate.toFixed(2)+'%</span></td>';
      r += '<td style="padding:7px 8px;text-align:center;">'+rateDeltaBadge(curRate, prevRate)+'</td>';
    }
    // 曝光占比
    r += '<td style="padding:7px 8px;text-align:center;font-size:11px;font-weight:600;color:#64748b;">'+expPct.toFixed(1)+'%</td>';
    r += '</tr>';
    return r;
  }

  // 二选一分组
  out += renderSubRow('摇一摇（二选一）', c2x1, {isGroupLabel:true});
  eff2x1Names.forEach(name => {
    out += renderSubRow(name, ch[name], {anomaly:(name==='其他')});
  });
  // 非二选一分组
  out += renderSubRow('周边（非二选一）', zbCh, {isGroupLabel:true, expInverse:true});
  // 支付有礼（与摇一摇、周边并列的渠道）
  if(payReward.exp > 0 || payReward.wrt > 0) {
    out += renderSubRow('支付有礼', payReward, {isGroupLabel:true});
  }

  out += '</tbody></table></div>';
  out += '</div>'; // 子渠道明细 end

  out += '</div>';
  return out;
}


// ============================================================
// 品牌渠道诊断（重设计）：未存活品牌分渠道对比
// ============================================================
function buildBrandChannelDiagnosis(brandName, cd) {
  if(!cd) return '';

  function qoqVal(a,b) { return (b&&b!==0) ? (a-b)/b*100 : null; }
  function fmtW(v) { return (v||0).toFixed(1)+'w'; }
  function fmtN(v) { return Math.round(v||0).toLocaleString(); }
  function calcRate(wrt, exp) { return exp>0 ? (wrt/(exp*10000)*100).toFixed(2)+'%' : '-'; }
  function calcRateNum(wrt, exp) { return exp>0 ? wrt/(exp*10000)*100 : 0; }
  function pctOf(a,b) { return b>0 ? (a/b*100).toFixed(1)+'%' : '-'; }
  function qoqBadge(v) {
    if(v===null||v===undefined) return '<span style="color:#94a3b8;font-size:11px;">—</span>';
    const color = v>=0 ? '#16a34a' : '#dc2626';
    const arrow = v>=0 ? '▲' : '▼';
    return '<span style="color:'+color+';font-size:11px;font-weight:700;">'+arrow+(v>=0?'+':'')+v.toFixed(1)+'%</span>';
  }
  function rateDeltaBadge(cur, prev) {
    const d = cur - prev;
    if(prev===0 && cur===0) return '<span style="color:#94a3b8;font-size:11px;">—</span>';
    const color = d>=0 ? '#16a34a' : '#dc2626';
    return '<span style="color:'+color+';font-size:11px;font-weight:700;">'+(d>=0?'+':'')+d.toFixed(2)+'pp</span>';
  }

  const chs = cd.chData;
  const zbShare = cd.zbShare||0;
  const pZbShare = cd.pZbShare||0;
  const zbDelta = zbShare - pZbShare;

  // 渠道列表
  const channels = ['商业支付','面对面','固定入口','周边','支付有礼'];

  // 二选一合计
  const eff2x1Chs = ['商业支付','面对面','固定入口','其他'];
  const s2x1 = {exp:0,wrt:0,pExp:0,pWrt:0};
  eff2x1Chs.forEach(c => {
    s2x1.exp += (chs[c]||{}).exp||0; s2x1.wrt += (chs[c]||{}).wrt||0;
    s2x1.pExp += (chs[c]||{}).pExp||0; s2x1.pWrt += (chs[c]||{}).pWrt||0;
  });
  const zbCh = chs['周边']||{};

  // 支付有礼：直接从品牌渠道数据读取
  const payRewardRaw = chs['支付有礼']||{};
  const payReward = {
    exp: payRewardRaw.exp||0,
    wrt: payRewardRaw.wrt||0,
    pExp: payRewardRaw.pExp||0,
    pWrt: payRewardRaw.pWrt||0
  };

  // 全渠道总量
  const brandTotExp = cd.totExp||0;
  const brandTotWrt = cd.totWrt||0;
  const brandPtotExp = cd.ptotExp||0;
  const brandPtotWrt = cd.ptotWrt||0;

  // 全渠道总量（含支付有礼）
  const totExp = brandTotExp;
  const totWrt = brandTotWrt;
  const ptotExpBrand = brandPtotExp;
  const ptotWrtBrand = brandPtotWrt;

  // 占比（分母为全渠道总量，含支付有礼，确保加总=100%）
  const expShare2x1 = totExp>0 ? s2x1.exp/totExp*100 : 0;
  const expShareZb = totExp>0 ? (zbCh.exp||0)/totExp*100 : 0;
  const expSharePay = totExp>0 ? payReward.exp/totExp*100 : 0;

  let out = '';
  out += '<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px;">';
  out += '<div style="font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;">分渠道诊断 <span style="font-size:11px;font-weight:400;color:var(--text-secondary);">判断核销率低是否由曝光分配造成</span></div>';

  // 上期占比（分母为全渠道总量，含支付有礼）
  const pExpShare2x1 = ptotExpBrand>0 ? s2x1.pExp/ptotExpBrand*100 : 0;
  const pExpShareZb = ptotExpBrand>0 ? (zbCh.pExp||0)/ptotExpBrand*100 : 0;
  const pExpSharePay = ptotExpBrand>0 ? payReward.pExp/ptotExpBrand*100 : 0;

  // ═══ 分渠道对比（以曝光占比为核心视觉，与渠道概览一致） ═══
  const bChRows = [
    {label:'摇一摇（二选一）', color:'#2563eb', d:s2x1, pct:expShare2x1, pPct:pExpShare2x1, inverse:false},
    {label:'周边（非二选一）', color:'#ea580c', d:{exp:zbCh.exp||0, pExp:zbCh.pExp||0, wrt:zbCh.wrt||0, pWrt:zbCh.pWrt||0}, pct:expShareZb, pPct:pExpShareZb, inverse:true},
    {label:'支付有礼', color:'#7c3aed', d:payReward, pct:expSharePay, pPct:pExpSharePay, inverse:false}
  ].filter(r => r.d.exp > 0 || r.d.wrt > 0);
  const bMaxPct = Math.max(...bChRows.map(r=>Math.max(r.pct,r.pPct,1)));

  const chExpDelta = totExp - ptotExpBrand;
  const chExpDeltaColor = chExpDelta>=0 ? '#16a34a' : '#dc2626';

  out += '<div style="background:#f8fafc;border-radius:8px;padding:12px 14px;margin-bottom:12px;">';
  out += '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:10px;">';
  out += '<span style="font-size:12px;font-weight:700;color:#475569;">分渠道对比</span>';
  out += '<span style="font-size:11px;color:#64748b;">渠道曝光 <strong style="color:#1e293b;">'+fmtW(totExp)+'</strong> <span style="color:'+chExpDeltaColor+';font-weight:700;">'+(chExpDelta>=0?'+':'')+chExpDelta.toFixed(1)+'w</span></span>';
  out += '</div>';

  // 表头
  out += '<div style="display:flex;align-items:center;padding:0 0 6px 0;border-bottom:1px solid #e2e8f0;margin-bottom:4px;font-size:10px;font-weight:600;color:#94a3b8;">';
  out += '<div style="width:120px;flex-shrink:0;">渠道</div>';
  out += '<div style="flex:2;text-align:center;">曝光占比</div>';
  out += '<div style="flex:1;text-align:center;">曝光量</div>';
  out += '<div style="flex:1;text-align:center;">核销量</div>';
  out += '<div style="flex:1;text-align:center;">核销率</div>';
  out += '</div>';

  bChRows.forEach((row, idx) => {
    const d = row.d;
    const expQ = qoqVal(d.exp, d.pExp);
    const wrtQ = qoqVal(d.wrt, d.pWrt);
    const curRate = calcRateNum(d.wrt, d.exp);
    const prevRate = calcRateNum(d.pWrt, d.pExp);
    const pctDelta = row.pct - row.pPct;
    const pctDeltaColor = pctDelta>0 ? '#16a34a' : (pctDelta<0 ? '#dc2626' : '#94a3b8');
    const barColor = row.color;
    const curW = Math.max(row.pct/bMaxPct*100, row.pct>0?4:0);
    const prevW = Math.max(row.pPct/bMaxPct*100, row.pPct>0?4:0);

    if(idx>0) out += '<div style="height:1px;background:#f1f5f9;margin:3px 0;"></div>';

    // 本期行
    out += '<div style="display:flex;align-items:center;gap:4px;padding:5px 0 2px 0;">';
    out += '<div style="width:120px;flex-shrink:0;display:flex;align-items:center;gap:4px;">';
    out += '<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+row.color+';flex-shrink:0;"></span>';
    out += '<span style="font-size:11px;font-weight:700;color:#1e293b;">'+row.label+'</span>';
    out += '</div>';
    // 曝光占比条
    out += '<div style="flex:2;display:flex;align-items:center;gap:4px;">';
    out += '<div style="flex:1;height:14px;background:#e2e8f0;border-radius:3px;overflow:hidden;">';
    out += '<div style="width:'+curW+'%;height:100%;background:'+barColor+';border-radius:3px;transition:width 0.5s;"></div>';
    out += '</div>';
    out += '<span style="font-size:12px;font-weight:800;color:'+barColor+';min-width:38px;text-align:right;">'+row.pct.toFixed(1)+'%</span>';
    out += '<span style="font-size:9px;font-weight:600;color:'+pctDeltaColor+';min-width:36px;">'+(pctDelta>=0?'+':'')+pctDelta.toFixed(1)+'pp</span>';
    out += '</div>';
    // 曝光量
    out += '<div style="flex:1;text-align:center;"><span style="font-size:11px;font-weight:700;color:#1e293b;">'+fmtW(d.exp)+'</span><br><span style="font-size:9px;">'+qoqBadge(expQ)+'</span></div>';
    // 核销量
    out += '<div style="flex:1;text-align:center;"><span style="font-size:11px;font-weight:700;color:#1e293b;">'+fmtN(d.wrt)+'</span><br><span style="font-size:9px;">'+qoqBadge(wrtQ)+'</span></div>';
    // 核销率
    out += '<div style="flex:1;text-align:center;"><span style="font-size:11px;font-weight:700;color:#1e293b;">'+curRate.toFixed(2)+'%</span><br><span style="font-size:9px;">'+rateDeltaBadge(curRate, prevRate)+'</span></div>';
    out += '</div>';

    // 上期行
    out += '<div style="display:flex;align-items:center;gap:4px;padding:0 0 3px 0;">';
    out += '<div style="width:120px;flex-shrink:0;padding-left:12px;"><span style="font-size:9px;color:#94a3b8;">上期</span></div>';
    out += '<div style="flex:2;display:flex;align-items:center;gap:4px;">';
    out += '<div style="flex:1;height:8px;background:#e2e8f0;border-radius:2px;overflow:hidden;">';
    if(row.pPct>0) out += '<div style="width:'+prevW+'%;height:100%;background:'+row.color+';opacity:0.3;border-radius:2px;"></div>';
    out += '</div>';
    out += '<span style="font-size:9px;color:#94a3b8;min-width:38px;text-align:right;">'+(row.pPct>0?row.pPct.toFixed(1)+'%':'—')+'</span>';
    out += '<span style="min-width:36px;"></span>';
    out += '</div>';
    out += '<div style="flex:1;text-align:center;font-size:9px;color:#94a3b8;">'+fmtW(d.pExp)+'</div>';
    out += '<div style="flex:1;text-align:center;font-size:9px;color:#94a3b8;">'+fmtN(d.pWrt)+'</div>';
    out += '<div style="flex:1;text-align:center;font-size:9px;color:#94a3b8;">'+prevRate.toFixed(2)+'%</div>';
    out += '</div>';
  });

  // 周边占比>50%警告
  if(expShareZb > 50) {
    out += '<div style="margin-top:8px;padding:6px 10px;background:#fef2f2;border-left:3px solid #dc2626;border-radius:0 4px 4px 0;font-size:10px;color:#991b1b;line-height:1.5;">';
    out += '<strong>⚠ 曝光分配不合理</strong>：周边占据 '+expShareZb.toFixed(1)+'% 曝光（'+fmtW(zbCh.exp||0)+'），转化效率远低于摇一摇，低效曝光稀释了整体核销率。';
    out += '</div>';
  }
  out += '</div>';

  // ═══ 非二选一核销率结构性解读 ═══
  const zbWrtQBrand = qoqVal(zbCh.wrt, zbCh.pWrt);
  const zbExpQBrand = qoqVal(zbCh.exp, zbCh.pExp);
  const zbRateCur = calcRateNum(zbCh.wrt, zbCh.exp);
  const zbRatePrev = calcRateNum(zbCh.pWrt, zbCh.pExp);
  const zbRateDeltaBrand = zbRateCur - zbRatePrev;
  // ═══ 子渠道精简明细（统一灰色调） ═══
  out += '<div style="overflow-x:auto;">';
  out += '<table style="width:100%;border-collapse:collapse;font-size:11px;">';
  out += '<thead><tr style="background:#f8fafc;">';
  out += '<th style="text-align:left;padding:6px 10px;font-weight:600;color:#94a3b8;font-size:10px;border-bottom:1px solid #e2e8f0;">渠道</th>';
  out += '<th style="text-align:center;padding:6px 6px;font-weight:600;color:#94a3b8;font-size:10px;border-bottom:1px solid #e2e8f0;">曝光量</th>';
  out += '<th style="text-align:center;padding:6px 6px;font-weight:600;color:#94a3b8;font-size:10px;border-bottom:1px solid #e2e8f0;">环比</th>';
  out += '<th style="text-align:center;padding:6px 6px;font-weight:600;color:#94a3b8;font-size:10px;border-bottom:1px solid #e2e8f0;">核销量</th>';
  out += '<th style="text-align:center;padding:6px 6px;font-weight:600;color:#94a3b8;font-size:10px;border-bottom:1px solid #e2e8f0;">环比</th>';
  out += '<th style="text-align:center;padding:6px 6px;font-weight:600;color:#94a3b8;font-size:10px;border-bottom:1px solid #e2e8f0;">核销率</th>';
  out += '<th style="text-align:center;padding:6px 6px;font-weight:600;color:#94a3b8;font-size:10px;border-bottom:1px solid #e2e8f0;">环比</th>';
  out += '<th style="text-align:center;padding:6px 6px;font-weight:600;color:#94a3b8;font-size:10px;border-bottom:1px solid #e2e8f0;">占比</th>';
  out += '</tr></thead><tbody>';

  channels.forEach(chName => {
    const d = chs[chName]||{};
    const expQoq = qoqVal(d.exp, d.pExp);
    const wrtQoq = qoqVal(d.wrt, d.pWrt);
    const curRate = calcRateNum(d.wrt, d.exp);
    const prevRate = calcRateNum(d.pWrt, d.pExp);
    const expPct = totExp>0 ? ((d.exp||0)/totExp*100) : 0;

    out += '<tr style="border-bottom:1px solid #f1f5f9;">';
    out += '<td style="padding:6px 10px;text-align:left;"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:#94a3b8;margin-right:5px;vertical-align:middle;"></span><span style="font-weight:500;color:#475569;">'+chName+'</span></td>';
    out += '<td style="padding:6px 6px;text-align:center;"><span style="font-weight:600;color:#1e293b;">'+fmtW(d.exp)+'</span><span style="color:#b0b8c4;font-size:9px;margin-left:2px;">/ '+fmtW(d.pExp)+'</span></td>';
    out += '<td style="padding:6px 6px;text-align:center;">'+qoqBadge(expQoq)+'</td>';
    out += '<td style="padding:6px 6px;text-align:center;"><span style="font-weight:600;color:#1e293b;">'+fmtN(d.wrt)+'</span><span style="color:#b0b8c4;font-size:9px;margin-left:2px;">/ '+fmtN(d.pWrt)+'</span></td>';
    out += '<td style="padding:6px 6px;text-align:center;">'+qoqBadge(wrtQoq)+'</td>';
    out += '<td style="padding:6px 6px;text-align:center;"><span style="font-weight:600;color:#1e293b;">'+curRate.toFixed(2)+'%</span><span style="color:#b0b8c4;font-size:9px;margin-left:2px;">/ '+prevRate.toFixed(2)+'%</span></td>';
    out += '<td style="padding:6px 6px;text-align:center;">'+rateDeltaBadge(curRate, prevRate)+'</td>';
    out += '<td style="padding:6px 6px;text-align:center;font-weight:600;color:#64748b;">'+expPct.toFixed(1)+'%</td>';
    out += '</tr>';
  });

  // 支付有礼明细行（有数据时才显示）
  if(payReward.exp > 0 || payReward.wrt > 0) {
    const prExpQoq = qoqVal(payReward.exp, payReward.pExp);
    const prWrtQoq = qoqVal(payReward.wrt, payReward.pWrt);
    const prCurRate = calcRateNum(payReward.wrt, payReward.exp);
    const prPrevRate = calcRateNum(payReward.pWrt, payReward.pExp);
    const prExpPct = totExp>0 ? (payReward.exp/totExp*100) : 0;
    out += '<tr style="border-bottom:1px solid #f1f5f9;background:#faf5ff;">';
    out += '<td style="padding:6px 10px;text-align:left;"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:#7c3aed;margin-right:5px;vertical-align:middle;"></span><span style="font-weight:600;color:#7c3aed;">支付有礼</span></td>';
    out += '<td style="padding:6px 6px;text-align:center;"><span style="font-weight:600;color:#1e293b;">'+fmtW(payReward.exp)+'</span><span style="color:#b0b8c4;font-size:9px;margin-left:2px;">/ '+fmtW(payReward.pExp)+'</span></td>';
    out += '<td style="padding:6px 6px;text-align:center;">'+qoqBadge(prExpQoq)+'</td>';
    out += '<td style="padding:6px 6px;text-align:center;"><span style="font-weight:600;color:#1e293b;">'+fmtN(payReward.wrt)+'</span><span style="color:#b0b8c4;font-size:9px;margin-left:2px;">/ '+fmtN(payReward.pWrt)+'</span></td>';
    out += '<td style="padding:6px 6px;text-align:center;">'+qoqBadge(prWrtQoq)+'</td>';
    out += '<td style="padding:6px 6px;text-align:center;"><span style="font-weight:600;color:#1e293b;">'+prCurRate.toFixed(2)+'%</span><span style="color:#b0b8c4;font-size:9px;margin-left:2px;">/ '+prPrevRate.toFixed(2)+'%</span></td>';
    out += '<td style="padding:6px 6px;text-align:center;">'+rateDeltaBadge(prCurRate, prPrevRate)+'</td>';
    out += '<td style="padding:6px 6px;text-align:center;font-weight:600;color:#7c3aed;">'+prExpPct.toFixed(1)+'%</td>';
    out += '</tr>';
  }

  out += '</tbody></table></div>';

  // ═══ 诊断结论 ═══
  const s2x1Rate = calcRateNum(s2x1.wrt, s2x1.exp);
  const s2x1PRate = calcRateNum(s2x1.pWrt, s2x1.pExp);
  const s2x1RateDelta = s2x1Rate - s2x1PRate;

  const isZbDilution = zbShare > 50 && zbDelta > 5 && (cd.wrtQoq===null || cd.wrtQoq<=0);
  const isEff2x1Low = s2x1.exp < 5 && brandTotExp > 10;
  const isExpShiftCausingLowRate = zbShare > 50 && s2x1Rate > calcRateNum(zbCh.wrt, zbCh.exp) * 3;

  let diagColor, diagBg, diagIcon, diagMsg;
  if(isZbDilution || isExpShiftCausingLowRate) {
    diagColor='#dc2626'; diagBg='#fef2f2'; diagIcon='⚠';
    diagMsg = '核销率低的核心原因是<strong>曝光分配不合理</strong>：周边渠道占据'+zbShare.toFixed(1)+'%曝光（环比'+(zbDelta>=0?'+':'')+zbDelta.toFixed(1)+'pp），但周边曝光核销率仅'+calcRate(zbCh.wrt,zbCh.exp)+'，远低于摇一摇的'+s2x1Rate.toFixed(2)+'%。大量无效曝光稀释了整体核销率。<strong>建议</strong>：将曝光资源向商业支付/面对面等高转化渠道倾斜。';
  } else if(isEff2x1Low) {
    diagColor='#ea580c'; diagBg='#fff7ed'; diagIcon='⚡';
    diagMsg = '摇一摇（二选一）有效曝光仅'+fmtW(s2x1.exp)+'（占总曝光'+pctOf(s2x1.exp,brandTotExp)+'），曝光供给不足是核销量低的主要瓶颈。<strong>建议</strong>：扩大商业支付/面对面渠道的曝光覆盖。';
  } else if(s2x1RateDelta < -0.5) {
    diagColor='#7c3aed'; diagBg='#f5f3ff'; diagIcon='📉';
    diagMsg = '摇一摇核销率下降'+Math.abs(s2x1RateDelta).toFixed(2)+'pp（'+s2x1PRate.toFixed(2)+'% → '+s2x1Rate.toFixed(2)+'%），曝光分配变化不大，核销率下降主要由<strong>转化效率下降</strong>导致，非曝光分配问题。需排查活动下线、货盘变化或用户体验。';
  } else {
    diagColor='#2563eb'; diagBg='#eff6ff'; diagIcon='ℹ';
    diagMsg = '各渠道曝光分配相对稳定，摇一摇核销率'+(s2x1RateDelta>=0?'提升':'下降')+Math.abs(s2x1RateDelta).toFixed(2)+'pp。整体表现'+(cd.wrtQoq!==null&&cd.wrtQoq>0?'呈改善趋势':'需持续关注')+'。';
  }

  out += '<div style="margin-top:14px;padding:12px 16px;background:'+diagBg+';border-left:4px solid '+diagColor+';border-radius:0 8px 8px 0;font-size:13px;line-height:1.8;">';
  out += '<span style="font-weight:700;color:'+diagColor+';">'+diagIcon+' 诊断结论</span><br>'+diagMsg;
  out += '</div>';

  out += '</div>';

  out += '</div>';
  return out;
}

// === 工具函数 ===
function fmt(n) { if(isNaN(n)||n===null) return '-'; return n>=10000?(n/10000).toFixed(1)+'w':Math.round(n).toLocaleString(); }
function pct(n) { if(isNaN(n)||n===null) return '-'; return (n*100).toFixed(2)+'%'; }
function pctSigned(n) { if(isNaN(n)||n===null) return '-'; return (n>=0?'+':'')+(n*100).toFixed(2)+'%'; }

// === 目标达成柱状图辅助 ===
function buildAchieveBar(label, rate, subText, goodThreshold=0.6, warnThreshold=0.3, qoq=null) {
  const pctVal = Math.min(rate * 100, 100);
  const color = rate>=goodThreshold ? '#16a34a' : rate>=warnThreshold ? '#d97706' : '#dc2626';
  const bgGrad = rate>=goodThreshold ? 'linear-gradient(90deg,#22c55e,#16a34a)' : rate>=warnThreshold ? 'linear-gradient(90deg,#fbbf24,#d97706)' : 'linear-gradient(90deg,#f87171,#dc2626)';
  let qoqHtml = '';
  if(qoq !== null && qoq !== undefined) {
    const qoqColor = qoq >= 0 ? '#16a34a' : '#dc2626';
    const qoqSign = qoq >= 0 ? '+' : '';
    const qoqArrow = qoq >= 0 ? '▲' : '▼';
    qoqHtml = `<span style="font-size:11px;color:${qoqColor};font-weight:700;margin-left:8px;background:${qoq>=0?'#f0fdf4':'#fef2f2'};padding:2px 8px;border-radius:10px;">${qoqArrow} ${qoqSign}${qoq.toFixed(1)}%</span>`;
  }
  return `<div class="achieve-bar-item">
    <div class="ab-label">${label}</div>
    <div class="ab-value" style="color:${color};">${isNaN(rate)||rate===0&&subText==='暂无数据'?'-':(rate*100).toFixed(1)+'%'}${qoqHtml}</div>
    <div class="ab-track"><div class="ab-fill" style="width:${pctVal}%;background:${bgGrad};"></div></div>
    <div class="ab-sub">${subText}</div>
  </div>`;
}
function tagRate(r) {
  if(isNaN(r)) return '<span class="tag tag-gray">-</span>';
  const p = (r*100).toFixed(1);
  if(r>=0.8) return `<span class="tag tag-green">${p}%</span>`;
  if(r>=0.4) return `<span class="tag tag-yellow">${p}%</span>`;
  return `<span class="tag tag-red">${p}%</span>`;
}
function encId(s) { return btoa(unescape(encodeURIComponent(s))).replace(/[+/=]/g,'_'); }
function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function escAttr(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
init();

function filterGoodCaseAll(viewId) {
  var ownerVal = (document.getElementById('goodOwnerFilter-'+viewId)||{}).value || '';
  var catVal = (document.getElementById('goodCatFilter-'+viewId)||{}).value || '';
  var searchVal = ((document.getElementById('goodSearchFilter-'+viewId)||{}).value || '').trim().toLowerCase();
  var tabsContainer = document.getElementById('good-tabs-'+viewId);
  var cardsContainer = document.getElementById('good-cards-'+viewId);
  if(!tabsContainer || !cardsContainer) return;
  var tabs = tabsContainer.querySelectorAll('.case-tab');
  var cards = cardsContainer.querySelectorAll('.case-tab-content');
  var visibleCount = 0, firstVisibleTab = null;
  tabs.forEach(function(t) {
    var show = (!ownerVal || t.dataset.owner===ownerVal) && (!catVal || t.dataset.category===catVal) && (!searchVal || (t.dataset.brand||'').toLowerCase().indexOf(searchVal)>=0);
    t.style.display = show ? '' : 'none';
    if(show) { visibleCount++; if(!firstVisibleTab) firstVisibleTab = t; }
  });
  var countEl = document.getElementById('goodCount-'+viewId);
  if(countEl) countEl.textContent = visibleCount + '个';
  if(firstVisibleTab) {
    tabs.forEach(function(t){ t.classList.remove('active'); });
    Array.from(cardsContainer.children).forEach(function(c){ if(c.classList.contains('case-tab-content')) c.classList.remove('active'); });
    firstVisibleTab.classList.add('active');
    var targetCard = document.getElementById(firstVisibleTab.dataset.target);
    if(targetCard) targetCard.classList.add('active');
  }
}

</script>
