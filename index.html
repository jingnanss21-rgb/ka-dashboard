// === 象限图绘制 ===
function drawQuadrantChart(viewId, ownerFilter) {
  const canvas = document.getElementById('chart-'+viewId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = 900, H = 600;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const allBrands = getBrandsForView(ownerFilter);
  const abnormalBrands = allBrands.filter(b => isBrandAbnormal(b));
  const brands = allBrands.filter(b => !isBrandAbnormal(b));

  const pad = { left: 80, right: 40, top: 40, bottom: 60 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  const survRates = brands.map(b => b.survivalRate || 0);
  const expRates = brands.map(b => b.exposureRedeemRate || 0);
  const maxSurv = Math.max(0.05, ...survRates) * 1.2;
  const maxExpRate = Math.max(0.03, ...expRates) * 1.2;

  const toX = v => pad.left + (v / maxSurv) * cw;
  const toY = v => pad.top + ch - (v / maxExpRate) * ch;

  const xLine = toX(0.01);
  const yLine = toY(0.01);

  ctx.fillStyle = 'rgba(52,168,83,0.06)';
  ctx.fillRect(xLine, pad.top, pad.left+cw-xLine, yLine-pad.top);
  ctx.fillStyle = 'rgba(66,133,244,0.06)';
  ctx.fillRect(pad.left, pad.top, xLine-pad.left, yLine-pad.top);
  ctx.fillStyle = 'rgba(249,171,0,0.06)';
  ctx.fillRect(xLine, yLine, pad.left+cw-xLine, pad.top+ch-yLine);
  ctx.fillStyle = 'rgba(234,67,53,0.06)';
  ctx.fillRect(pad.left, yLine, xLine-pad.left, pad.top+ch-yLine);

  ctx.setLineDash([6,4]);
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = '#ea4335';
  ctx.beginPath(); ctx.moveTo(xLine, pad.top); ctx.lineTo(xLine, pad.top+ch); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad.left, yLine); ctx.lineTo(pad.left+cw, yLine); ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#ea4335';
  ctx.font = '11px PingFang SC, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('存活率=1%', xLine+4, pad.top+14);
  ctx.textAlign = 'right';
  ctx.fillText('核销率=1%', pad.left+cw-4, yLine-6);

  ctx.font = 'bold 13px PingFang SC, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(52,168,83,0.5)';
  ctx.fillText('健康品牌', (xLine+pad.left+cw)/2, pad.top+30);
  ctx.fillStyle = 'rgba(66,133,244,0.5)';
  ctx.fillText('未存活但核销率高', (pad.left+xLine)/2, pad.top+30);
  ctx.fillStyle = 'rgba(249,171,0,0.5)';
  ctx.fillText('存活但核销率低', (xLine+pad.left+cw)/2, pad.top+ch-10);
  ctx.fillStyle = 'rgba(234,67,53,0.5)';
  ctx.fillText('双差品牌', (pad.left+xLine)/2, pad.top+ch-10);

  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, pad.top+ch); ctx.lineTo(pad.left+cw, pad.top+ch); ctx.stroke();

  ctx.fillStyle = '#666'; ctx.font = '11px PingFang SC, sans-serif'; ctx.textAlign = 'center';
  for(let i=0; i<=5; i++) {
    const v = maxSurv * i / 5;
    const x = toX(v);
    ctx.beginPath(); ctx.moveTo(x, pad.top+ch); ctx.lineTo(x, pad.top+ch+5); ctx.stroke();
    ctx.fillText((v*100).toFixed(1)+'%', x, pad.top+ch+20);
  }
  ctx.fillStyle = '#333'; ctx.font = 'bold 13px PingFang SC, sans-serif';
  ctx.fillText('存活率', pad.left+cw/2, pad.top+ch+45);

  ctx.fillStyle = '#666'; ctx.font = '11px PingFang SC, sans-serif'; ctx.textAlign = 'right';
  for(let i=0; i<=5; i++) {
    const v = maxExpRate * i / 5;
    const y = toY(v);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left-5, y); ctx.stroke();
    ctx.fillText((v*100).toFixed(2)+'%', pad.left-10, y+4);
  }
  ctx.save(); ctx.translate(18, pad.top+ch/2); ctx.rotate(-Math.PI/2);
  ctx.fillStyle = '#333'; ctx.font = 'bold 13px PingFang SC, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('曝光核销率', 0, 0); ctx.restore();

  const maxRedeem = Math.max(1, ...brands.map(b=>b.dailyRedeem||0));
  brands.forEach(b => {
    const sr = b.survivalRate || 0;
    const er = b.exposureRedeemRate || 0;
    const alive = isBrandAlive(b);
    const hasExposure = (b.dailyExposure||0) > 0;
    let color;
    if(!hasExposure) color = '#9e9e9e';
    else if(alive && er >= 0.01) color = '#34a853';
    else if(alive && er < 0.01) color = '#f9ab00';
    else if(!alive && er >= 0.01) color = '#4285f4';
    else color = '#ea4335';

    const x = toX(Math.min(sr, maxSurv));
    const y = toY(Math.min(er, maxExpRate));
    const r = Math.max(5, Math.min(30, Math.sqrt((b.dailyRedeem||0)/maxRedeem) * 30));

    ctx.globalAlpha = 0.7; ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1; ctx.strokeStyle = color; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();

    ctx.fillStyle = '#333'; ctx.font = '10px PingFang SC, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(b.name.length > 5 ? b.name.substring(0,5)+'..' : b.name, x, y - r - 4);
  });

  if(abnormalBrands.length > 0) {
    ctx.fillStyle = '#e65100'; ctx.font = '12px PingFang SC, sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('⚠ 异常数据已排除：' + abnormalBrands.map(b => b.name).join('、'), pad.left + 4, H - 8);
  }
}

// === 反馈功能 ===
async function submitFeedback(brandName, owner, sourceViewId) {
  const inputIds = [
    'fb-input-'+sourceViewId+'-'+encId(brandName),
    'fb-case-'+sourceViewId+'-'+encId(brandName),
  ];
  let text = '', sourceEl = null;
  for(const id of inputIds) {
    const el = document.getElementById(id);
    if(el && el.value.trim()) { text = el.value.trim(); sourceEl = el; break; }
  }
  if(!text) { showToast('请输入反馈内容', 'warning'); return; }
  const fbOwner = currentIdentity || owner || '未知';
  const { error } = await sbClient.from('ka_feedbacks').insert({
    brand_name: brandName,
    text: text,
    owner: fbOwner
  });
  if(error) { showToast('保存失败: ' + error.message, 'warning'); return; }
  if(sourceEl) sourceEl.value = '';
  showToast('反馈保存成功', 'success');
}

// === 编辑反馈（弹窗）===
function editFeedback(brandName, index) {
  if(!feedbacks[brandName] || !feedbacks[brandName][index]) return;
  const f = feedbacks[brandName][index];
  showModal('编辑反馈 — ' + brandName, f.text, async (newText) => {
    if(f.id) {
      const { error } = await sbClient.from('ka_feedbacks').update({ text: newText }).eq('id', f.id);
      if(error) { showToast('更新失败: ' + error.message, 'warning'); return; }
    }
    showToast('反馈已更新', 'success');
  });
}

// === 删除反馈（确认弹窗）===
function confirmDeleteFeedback(brandName, index) {
  if(!feedbacks[brandName] || !feedbacks[brandName][index]) return;
  const f = feedbacks[brandName][index];
  showConfirm('确认删除', `确定要删除这条反馈吗？<br><br><em style="color:var(--text-secondary);">"${escHtml(f.text.substring(0,50))}${f.text.length>50?'...':''}"</em>`, async () => {
    if(f.id) {
      const { error } = await sbClient.from('ka_feedbacks').delete().eq('id', f.id);
      if(error) { showToast('删除失败: ' + error.message, 'warning'); return; }
    }
    showToast('反馈已删除', 'info');
  });
}

function refreshAllFeedbackDisplays(brandName) {
  // 重建所有面板以确保活动信息区域的反馈也同步更新
  buildAllPanels();
  ['overall',...OWNERS.map(o=>'owner-'+o)].forEach(v => {
    refreshTable(v, v==='overall'?'':v.replace('owner-',''));
  });
  // 确保当前活跃tab对应的panel可见
  const activeTab = document.querySelector('.nav-tab.active');
  if(activeTab) {
    const viewId = activeTab.dataset.view;
    document.getElementById('view-'+viewId)?.classList.add('active');
    const owner = viewId==='overall'?null:viewId.replace('owner-','');
    setTimeout(() => drawQuadrantChart(viewId, owner), 50);
  }
}

function renderAllFeedbackSummary() {
  const el = document.getElementById('allFeedbackSummary');
  if(!el) return;
  const entries = Object.entries(feedbacks).filter(([k,v])=>v&&v.length>0);
  if(!entries.length) {
    el.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:20px;">暂无反馈</p>';
    return;
  }
  let html = '';
  entries.forEach(([brand, fbs]) => {
    const a = DATA.assignments.find(x=>x.brand===brand);
    html += `<div class="fb-brand-group">
      <h5>${brand} ${a?'<span style="color:var(--text-secondary);font-weight:400;font-size:12px;">('+a.owner+')</span>':''}</h5>`;
    fbs.forEach((f,i) => {
      html += buildFeedbackItemHtml(brand, f, i);
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

// === 弹窗系统 ===
function showModal(title, defaultText, onSave) {
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h4>${title}</h4>
      <textarea id="modalTextarea">${escHtml(defaultText)}</textarea>
      <div class="modal-btns">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="modalSaveBtn">保存</button>
      </div>
    </div>
  </div>`;
  const ta = document.getElementById('modalTextarea');
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
  document.getElementById('modalSaveBtn').onclick = () => {
    const v = ta.value.trim();
    if(!v) { showToast('内容不能为空','warning'); return; }
    onSave(v);
    closeModal();
  };
}

function showConfirm(title, message, onConfirm) {
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h4>${title}</h4>
      <div style="font-size:14px;line-height:1.6;">${message}</div>
      <div class="modal-btns">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn" style="background:var(--danger);color:#fff;" id="modalConfirmBtn">删除</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalConfirmBtn').onclick = () => {
    onConfirm();
    closeModal();
  };
}

function closeModal() {
  document.getElementById('modalRoot').innerHTML = '';
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = type==='success'?'#34a853':type==='warning'?'#f9ab00':'#1a73e8';
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 2500);
}

// === 诊断逻辑（结构化5维分析）===
// 返回 { pricePower, exposure, storeRedeem, storeComplete, activity, overview } 每个维度含 items[] 和 status
function diagnoseBrand(b, acts, med) {
  const result = {
    pricePower: { title:'价格力', icon:'💰', items:[], value: pctSigned(b.pricePower), median: pctSigned(med.medianPricePower), status:'ok' },
    exposure: { title:'高低频应曝尽曝率', icon:'📡', items:[], status:'ok',
      metrics: [
        { label:'高频应曝尽曝率', value: pct(b.highFreqExposureRate), median: pct(med.medianHighFreqRate), ok: b.highFreqExposureRate >= med.medianHighFreqRate },
        { label:'低频应曝尽曝率', value: pct(b.lowFreqExposureRate), median: pct(med.medianLowFreqRate), ok: b.lowFreqExposureRate >= med.medianLowFreqRate }
      ]
    },
    storeRedeem: { title:'到店未核销', icon:'🏪', items:[], status:'ok',
      metrics: [
        { label:'到店核销率', value: pct(b.storeRedeemRate), median: pct(med.medianStoreRedeemRate), ok: b.storeRedeemRate >= med.medianStoreRedeemRate },
        { label:'未达门槛率', value: pct(b.unreachedThresholdRate), threshold:'10%', ok: b.unreachedThresholdRate <= 0.1 }
      ]
    },
    storeComplete: { title:'门店/商户号完整度', icon:'🔗', items:[], status:'ok',
      metrics: [
        { label:'门店完整度', value: pct(b.storeCompleteness), threshold:'80%', ok: b.storeCompleteness >= 0.8 },
        { label:'商户号完整度', value: b.merchantCompleteness ? pct(b.merchantCompleteness) : '-', threshold:'95%', ok: !b.merchantCompleteness || b.merchantCompleteness >= 0.95 }
      ]
    },
    activity: { title:'活动信息', icon:'📋', items:[], status:'ok' }
  };

  // 价格力
  if(b.pricePower < 0) {
    result.pricePower.status = 'bad';
    result.pricePower.items.push(`价格力${pctSigned(b.pricePower)}，为负值，货盘竞争力不足，低于同品类均值`);
  } else if(b.pricePower < med.medianPricePower) {
    result.pricePower.status = 'warn';
    result.pricePower.items.push(`价格力${pctSigned(b.pricePower)}，低于中位数${pctSigned(med.medianPricePower)}，优惠力度偏弱`);
  } else {
    result.pricePower.items.push(`价格力${pctSigned(b.pricePower)}，高于中位数${pctSigned(med.medianPricePower)}，货盘有竞争力`);
  }

  // 高低频应曝尽曝（反映老客曝光占比，关注罗盘分层合理性）
  if(b.highFreqExposureRate < med.medianHighFreqRate) {
    result.exposure.status = 'bad';
    result.exposure.items.push(`高频用户应曝尽曝率${pct(b.highFreqExposureRate)}，低于中位数${pct(med.medianHighFreqRate)}——老客获得的曝光不够充分，建议排查罗盘人群分层设置`);
  } else {
    result.exposure.items.push(`高频用户应曝尽曝率${pct(b.highFreqExposureRate)}，高于中位数，老客曝光占比较高，有利于转化`);
  }
  if(b.lowFreqExposureRate < med.medianLowFreqRate) {
    if(result.exposure.status!=='bad') result.exposure.status = 'warn';
    result.exposure.items.push(`低频用户应曝尽曝率${pct(b.lowFreqExposureRate)}，低于中位数${pct(med.medianLowFreqRate)}——老客曝光仍有提升空间，可检查罗盘分层配置`);
  } else {
    result.exposure.items.push(`低频用户应曝尽曝率${pct(b.lowFreqExposureRate)}，高于中位数，老客曝光覆盖到位`);
  }

  // 到店未核销
  if(b.storeRedeemRate < med.medianStoreRedeemRate) {
    result.storeRedeem.status = 'bad';
    result.storeRedeem.items.push(`到店核销率${pct(b.storeRedeemRate)}，低于中位数${pct(med.medianStoreRedeemRate)}，用户到店后转化流失较多`);
    result.storeRedeem.items.push(`7日到店${fmt(b.totalVisit7d||0)}人，其中达门槛${fmt(b.reachedThreshold7d||0)}人、未达门槛${fmt(b.unreachedThreshold7d||0)}人`);
    result.storeRedeem.items.push(`<strong>排查方向：</strong>①小程序核券体验，是否引导会员注册和用券 ②门店POS机核销，店员是否培训核券流程 ③是否存在更优惠货盘 ④是否存在优先用券逻辑（如优先核销到期时间更近的券）`);
  } else {
    result.storeRedeem.items.push(`到店核销率${pct(b.storeRedeemRate)}，高于中位数，用户到店转化强`);
    result.storeRedeem.items.push(`7日到店${fmt(b.totalVisit7d||0)}人，其中达门槛${fmt(b.reachedThreshold7d||0)}人、未达门槛${fmt(b.unreachedThreshold7d||0)}人`);
  }
  if(b.unreachedThresholdRate > 0.1) {
    if(result.storeRedeem.status!=='bad') result.storeRedeem.status = 'warn';
    result.storeRedeem.items.push(`未达门槛率${pct(b.unreachedThresholdRate)}，超过10%用户到店后因未达门槛无法核销`);
  } else {
    result.storeRedeem.items.push(`未达门槛率${pct(b.unreachedThresholdRate)}，门槛设置合理`);
  }

  // 门店/商户号完整度
  if(b.storeCompleteness < 0.8) {
    result.storeComplete.status = 'bad';
    result.storeComplete.items.push(`门店完整度${pct(b.storeCompleteness)}，偏低，可能有门店未上线或数据缺失`);
  } else {
    result.storeComplete.items.push(`门店完整度${pct(b.storeCompleteness)}，覆盖充分`);
  }
  if(b.merchantCompleteness && b.merchantCompleteness < 0.95) {
    if(result.storeComplete.status!=='bad') result.storeComplete.status = 'warn';
    result.storeComplete.items.push(`商户号完整度${pct(b.merchantCompleteness)}，部分商户号未绑定`);
  } else if(b.merchantCompleteness) {
    result.storeComplete.items.push(`商户号完整度${pct(b.merchantCompleteness)}，绑定完整`);
  }

  // 活动
  const wholeStoreActs = acts.filter(a=>a.isWholeStore===1);
  const lowThresholdWhole = wholeStoreActs.filter(a=>a.thresholdJudge==='低于笔单价');
  if(lowThresholdWhole.length>0) {
    result.activity.status = 'good';
    result.activity.items.push(`${lowThresholdWhole.length}个全场券门槛低于客单价(¥${acts[0]?.brandAvgPrice||'-'})，有利于用户到店后核销转化`);
  } else if(wholeStoreActs.length>0) {
    result.activity.status = 'warn';
    result.activity.items.push(`存在${wholeStoreActs.length}个全场券活动，需关注是否稀释转化`);
  }
  if(acts.length===0) {
    result.activity.status = 'bad';
    result.activity.items.push('当前无在跑活动，缺少流量入口');
  } else {
    result.activity.items.push(`当前在跑${acts.length}个活动`);
  }

  return result;
}

function analyzeGoodCase(b, med) {
  const result = {
    pricePower: { title:'价格力', icon:'💰', items:[], value: pctSigned(b.pricePower), median: pctSigned(med.medianPricePower), status:'ok' },
    exposure: { title:'高低频应曝尽曝率', icon:'📡', items:[], status:'ok',
      metrics: [

        { label:'低频应曝尽曝率', value: pct(b.lowFreqExposureRate), median: pct(med.medianLowFreqRate), ok: b.lowFreqExposureRate >= med.medianLowFreqRate }
      ]
    },
    storeRedeem: { title:'到店未核销', icon:'🏪', items:[], status:'ok',
      metrics: [
        { label:'到店核销率', value: pct(b.storeRedeemRate), median: pct(med.medianStoreRedeemRate), ok: b.storeRedeemRate >= med.medianStoreRedeemRate },

      ]
    },
    activity: { title:'活动信息', icon:'📋', items:[], status:'ok' }
  };

  // 价格力
  if(b.pricePower > med.medianPricePower) {
    result.pricePower.status = 'good';
    result.pricePower.items.push(`价格力${pctSigned(b.pricePower)}，高于中位数${pctSigned(med.medianPricePower)}，货盘优惠力度有竞争力`);
  } else {
    result.pricePower.items.push(`价格力${pctSigned(b.pricePower)}，与中位数${pctSigned(med.medianPricePower)}持平或略低`);
  }

  // 高低频应曝尽曝（反映老客曝光占比）
  if(b.highFreqExposureRate > med.medianHighFreqRate) {
    result.exposure.status = 'good';
    result.exposure.items.push(`高频用户应曝尽曝率${pct(b.highFreqExposureRate)}，高于中位数${pct(med.medianHighFreqRate)}，老客曝光占比较高，有助于拉升转化`);
  } else {
    result.exposure.items.push(`高频用户应曝尽曝率${pct(b.highFreqExposureRate)}，接近或略低于中位数，可关注罗盘分层配置`);
  }
  if(b.lowFreqExposureRate > med.medianLowFreqRate) {
    if(result.exposure.status!=='good') result.exposure.status = 'good';
    result.exposure.items.push(`低频用户应曝尽曝率${pct(b.lowFreqExposureRate)}，高于中位数${pct(med.medianLowFreqRate)}，老客曝光覆盖充分`);
  } else {
    result.exposure.items.push(`低频用户应曝尽曝率${pct(b.lowFreqExposureRate)}，接近或略低于中位数，可关注罗盘分层配置`);
  }

  // 到店核销
  if(b.storeRedeemRate > med.medianStoreRedeemRate) {
    result.storeRedeem.status = 'good';
    result.storeRedeem.items.push(`到店核销率${pct(b.storeRedeemRate)}，高于中位数${pct(med.medianStoreRedeemRate)}，用户到店转化强`);
  } else {
    result.storeRedeem.items.push(`到店核销率${pct(b.storeRedeemRate)}，接近或略低于中位数`);
  }
  result.storeRedeem.items.push(`7日到店${fmt(b.totalVisit7d||0)}人，其中达门槛${fmt(b.reachedThreshold7d||0)}人、未达门槛${fmt(b.unreachedThreshold7d||0)}人`);
  if(b.unreachedThresholdRate <= 0.03) {
    result.storeRedeem.items.push(`未达门槛率仅${pct(b.unreachedThresholdRate)}，门槛设置合理，用户核销顺畅`);
  } else {
    result.storeRedeem.items.push(`未达门槛率${pct(b.unreachedThresholdRate)}`);
  }

  // 门店完整度
  if(b.storeCompleteness >= 0.95) {
    result.storeComplete.status = 'good';
    result.storeComplete.items.push(`门店完整度${pct(b.storeCompleteness)}，门店覆盖充分`);
  } else {
    result.storeComplete.items.push(`门店完整度${pct(b.storeCompleteness)}`);
  }
  if(b.merchantCompleteness) {
    result.storeComplete.items.push(`商户号完整度${pct(b.merchantCompleteness)}${b.merchantCompleteness>=0.95?'，绑定完整':'，部分未绑定'}`);
  }

  // 活动
  if(b.activityCount >= 3) {
    result.activity.status = 'good';
    result.activity.items.push(`当前在跑${b.activityCount.toFixed(0)}个活动`);
  } else if(b.activityCount > 0) {
    result.activity.items.push(`当前在跑${b.activityCount.toFixed(0)}个活动`);
  } else {
    result.activity.items.push('当前活动较少');
  }

  return result;
}

// 分渠道曝光核销环比模块（v3）
// ============================================================
function buildChannelBreakdownSection() {
  const gd = CHANNEL_DATA.globalData;
  const ch = gd.channels;

  function qoqVal(a,b) { return (b&&b!==0) ? (a-b)/b*100 : null; }
  function fmtW(v) { return (v||0).toFixed(1)+'w'; }
  function fmtN(v) { return Math.round(v||0).toLocaleString(); }
  function calcRateNum(wrt,exp) { return exp>0 ? wrt/(exp*10000)*100 : null; }
  function calcRate(wrt,exp) { const r=calcRateNum(wrt,exp); return r!==null?r.toFixed(2)+'%':'-'; }
  function pctOf(a,b) { return b>0 ? (a/b*100).toFixed(1)+'%' : '-'; }

  function qoqTag(v, inverse) {
    if(v===null||v===undefined) return '<span style="color:#bbb;font-size:11px;">—</span>';
    const up = inverse ? v<=0 : v>=0;
    const color = up ? '#34a853' : '#ea4335';
    const arrow = v>=0 ? '▲' : '▼';
    return '<span style="color:'+color+';font-size:12px;font-weight:700;">'+arrow+' '+(v>=0?'+':'')+v.toFixed(1)+'%</span>';
  }

  // 二选一合计
  const e2Chs = ['商业支付','面对面','固定入口','其他'];
  const c2x1 = {exp:0,wrt:0,pExp:0,pWrt:0};
  e2Chs.forEach(c=>{c2x1.exp+=ch[c].exp;c2x1.wrt+=ch[c].wrt;c2x1.pExp+=ch[c].pExp;c2x1.pWrt+=ch[c].pWrt;});
  const zbCh = ch['周边'];
  const totExp = c2x1.exp + zbCh.exp;
  const totWrt = c2x1.wrt + zbCh.wrt;
  const ptotExp = c2x1.pExp + zbCh.pExp;
  const ptotWrt = c2x1.pWrt + zbCh.pWrt;

  // 核销率及环比
  const r2x1 = calcRateNum(c2x1.wrt, c2x1.exp);
  const pr2x1 = calcRateNum(c2x1.pWrt, c2x1.pExp);
  const rzb = calcRateNum(zbCh.wrt, zbCh.exp);
  const przb = calcRateNum(zbCh.pWrt, zbCh.pExp);
  const rQoq2x1 = (r2x1!==null&&pr2x1!==null&&pr2x1!==0) ? (r2x1-pr2x1)/pr2x1*100 : null;
  const rQoqZb = (rzb!==null&&przb!==null&&przb!==0) ? (rzb-przb)/przb*100 : null;

  const zbSharePct = totExp>0 ? zbCh.exp/totExp*100 : 0;
  const e2SharePct = totExp>0 ? c2x1.exp/totExp*100 : 0;
  const pzbSharePct = ptotExp>0 ? zbCh.pExp/ptotExp*100 : 0;
  const pe2SharePct = ptotExp>0 ? c2x1.pExp/ptotExp*100 : 0;
  const zbShareWarn = zbSharePct > 40;

  let out = '';
  out += '<div class="achieve-bars-section" style="margin-bottom:20px;">';
  out += '<div class="achieve-bars-title" style="margin-bottom:18px;"><span style="width:4px;height:20px;background:#673ab7;border-radius:2px;display:inline-block;margin-right:8px;vertical-align:middle;"></span>分渠道曝光 & 核销<span style="font-size:11px;color:#aaa;font-weight:400;margin-left:8px;">本期 vs 上期 | 0311-0317 vs 0304-0310</span></div>';

  // ═══════════════════════════════════════════
  // 顶部：曝光构成可视化横条（完整占比一览）
  // ═══════════════════════════════════════════
  out += '<div style="margin-bottom:20px;">';
  out += '<div style="font-size:11px;color:#888;margin-bottom:6px;display:flex;justify-content:space-between;"><span>全渠道曝光构成</span><span>总曝光 本期 '+fmtW(totExp)+' / 上期 '+fmtW(ptotExp)+'</span></div>';
  // 本期
  out += '<div style="margin-bottom:6px;">';
  out += '<div style="font-size:10px;color:#aaa;margin-bottom:3px;">本期</div>';
  out += '<div style="display:flex;border-radius:6px;overflow:hidden;height:22px;">';
  out += '<div style="width:'+e2SharePct.toFixed(1)+'%;background:#1a73e8;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;min-width:40px;">二选一 '+e2SharePct.toFixed(1)+'%</div>';
  out += '<div style="width:'+zbSharePct.toFixed(1)+'%;background:'+(zbShareWarn?'#f44336':'#f9ab00')+';display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;min-width:40px;">周边 '+zbSharePct.toFixed(1)+'%</div>';
  out += '</div></div>';
  // 上期
  out += '<div>';
  out += '<div style="font-size:10px;color:#aaa;margin-bottom:3px;">上期</div>';
  out += '<div style="display:flex;border-radius:6px;overflow:hidden;height:14px;">';
  out += '<div style="width:'+pe2SharePct.toFixed(1)+'%;background:#90bafc;"></div>';
  out += '<div style="width:'+pzbSharePct.toFixed(1)+'%;background:#fcd980;"></div>';
  out += '</div>';
  out += '<div style="display:flex;gap:12px;margin-top:3px;font-size:10px;color:#aaa;"><span>■ 二选一 '+pe2SharePct.toFixed(1)+'%</span><span>■ 周边 '+pzbSharePct.toFixed(1)+'%</span>'+(zbSharePct-pzbSharePct>0?'<span style="color:'+(zbShareWarn?'#f44336':'#e65100')+'">周边占比 +'+(zbSharePct-pzbSharePct).toFixed(1)+'pp ▲</span>':'<span style="color:#34a853">周边占比 '+(zbSharePct-pzbSharePct).toFixed(1)+'pp</span>')+'</div>';
  out += '</div></div>';

  // ═══════════════════════════════════════════
  // 双卡片：二选一 vs 非二选一
  // ═══════════════════════════════════════════
  out += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">';

  function bigCard(title, topColor, mainBg, borderWarn,
      expVal, pExpVal, expShare, pExpShare,
      wrtVal, pWrtVal, wrtShare, pWrtShare,
      rateVal, pRateVal, rateQoq, inverse) {

    c += '<div style="border-top:1px solid rgba(0,0,0,0.06);margin:8px 0;"></div>';
    c += '<div style="font-size:11px;color:#888;">日均 <strong>'+fmtN(wrtVal)+'</strong></div>';
    c += '<div style="font-size:11px;margin-top:2px;">'+qoqTag(wrtQ)+'<span style="font-size:10px;color:#aaa;margin-left:4px;">上期 '+fmtN(pWrtVal)+'</span></div>';

    // 核销率列
    c += '<div style="background:rgba(0,0,0,0.03);padding:10px 12px;">';
    c += '<div style="font-size:10px;color:#888;margin-bottom:6px;font-weight:600;letter-spacing:.5px;">核销率</div>';
    c += '<div style="font-size:24px;font-weight:900;color:'+topColor+';line-height:1.1;">'+rateVal+'</div>';
    c += '<div style="font-size:12px;margin-top:6px;">'+qoqTag(rateQoq)+'</div>';
    c += '<div style="font-size:11px;color:#aaa;margin-top:4px;">上期 '+pRateVal+'</div>';
    c += '</div>';
    c += '</div></div>';
    return c;
  }

  out += bigCard(
    '二选一', '#1a73e8', '#f0f7ff', false,
    c2x1.exp, c2x1.pExp, pctOf(c2x1.exp,totExp), pctOf(c2x1.pExp,ptotExp),
    c2x1.wrt, c2x1.pWrt, pctOf(c2x1.wrt,totWrt), pctOf(c2x1.pWrt,ptotWrt),
    r2x1!==null?r2x1.toFixed(2)+'%':'-', pr2x1!==null?pr2x1.toFixed(2)+'%':'-',
    rQoq2x1, false
  );
  out += bigCard(
    '非二选一（周边）'+(zbShareWarn?' <span style="font-size:11px;background:#fde8e8;color:#f44336;padding:2px 6px;border-radius:4px;font-weight:400;">⚠ 占比偏高</span>':''),
    zbShareWarn?'#f44336':'#e65100', '#fffde7', zbShareWarn,
    zbCh.exp, zbCh.pExp, pctOf(zbCh.exp,totExp), pctOf(zbCh.pExp,ptotExp),
    zbCh.wrt, zbCh.pWrt, pctOf(zbCh.wrt,totWrt), pctOf(zbCh.pWrt,ptotWrt),
    rzb!==null?rzb.toFixed(2)+'%':'-', przb!==null?przb.toFixed(2)+'%':'-',
    rQoqZb, true
  );
  out += '</div>'; // end dual card grid

  // ═══════════════════════════════════════════
  // 子渠道折叠：占比为主，绝对值+核销率为辅
  // ═══════════════════════════════════════════
  out += '<div style="border-top:1px solid #e8eaed;padding-top:12px;">';
  out += '<div style="cursor:pointer;font-size:12px;color:#888;user-select:none;margin-bottom:10px;" onclick="toggleSubChDetail(this)">▸ 展开子渠道明细</div>';
  out += '<div style="display:none;">';

  const subChs = [
    {name:'商业支付', color:'#1a73e8', bg:'#e8f0fe'},
    {name:'面对面',   color:'#0d7a1a', bg:'#e6f4ea'},
    {name:'固定入口', color:'#5c35cc', bg:'#f0ebff'},
    {name:'其他',     color:'#888',    bg:'#f5f5f5', note:true},
    {name:'周边',     color:'#e65100', bg:'#fff3e0', inverse:true},
  ];

  out += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;">';
  subChs.forEach(r => {
    const d = ch[r.name];
    const eShare = pctOf(d.exp, totExp);
    const wShare = pctOf(d.wrt, totWrt);
    const peShare = pctOf(d.pExp, ptotExp);
    const pwShare = pctOf(d.pWrt, ptotWrt);
    const rate = r.note ? null : calcRateNum(d.wrt, d.exp);
    const prate = r.note ? null : calcRateNum(d.pWrt, d.pExp);
    const rQoq = (rate!==null&&prate!==null&&prate!==0) ? (rate-prate)/prate*100 : null;
    out += '<div style="background:'+r.bg+';border-radius:8px;padding:10px 12px;">';
    out += '<div style="font-size:12px;font-weight:700;color:'+r.color+';margin-bottom:8px;">'+r.name+(r.note?' <span style="font-size:10px;color:#e65100;font-weight:400;">⚠数据口径</span>':'')+'</div>';
    // 占比行
    out += '<div style="font-size:10px;color:#888;margin-bottom:2px;">曝光占比</div>';
    out += '<div style="font-size:16px;font-weight:800;color:#1a1a1a;">'+eShare+'</div>';
    out += '<div style="font-size:10px;color:#aaa;">上期 '+peShare+' '+qoqTag(qoqVal(parseFloat(eShare),parseFloat(peShare)), r.inverse)+'</div>';
    out += '<div style="border-top:1px solid rgba(0,0,0,0.06);margin:6px 0;"></div>';
    // 核销占比
    out += '<div style="font-size:10px;color:#888;margin-bottom:2px;">核销占比</div>';
    out += '<div style="font-size:16px;font-weight:800;color:#1a1a1a;">'+wShare+'</div>';
    out += '<div style="font-size:10px;color:#aaa;">上期 '+pwShare+' '+qoqTag(qoqVal(parseFloat(wShare),parseFloat(pwShare)))+'</div>';
    out += '<div style="border-top:1px solid rgba(0,0,0,0.06);margin:6px 0;"></div>';
    // 绝对值 + 核销率
    out += '<div style="font-size:10px;color:#aaa;">曝 '+fmtW(d.exp)+' &nbsp;核 '+fmtN(d.wrt)+'</div>';
    if(!r.note) {
      out += '<div style="font-size:11px;margin-top:3px;">核销率 <strong style="color:'+r.color+'">'+calcRate(d.wrt,d.exp)+'</strong> '+qoqTag(rQoq)+'</div>';
    }
    out += '</div>';
  });
  out += '</div>';
  out += '</div></div>'; // end collapse + section
  out += '</div>'; // end achieve-bars-section
  return out;
}


// ============================================================
// 品牌渠道诊断（v3）：固定指标 × 分渠道 × 本期 vs 上期
// ============================================================
function buildBrandChannelDiagnosis(brandName, cd) {
  if(!cd) return '';

  function qoqVal(a,b) { return (b&&b!==0) ? (a-b)/b*100 : null; }
  function fmtW(v) { return (v||0).toFixed(1)+'w'; }
  function fmtN(v) { return Math.round(v||0).toLocaleString(); }
  function calcRateNum(wrt,exp) { return exp>0 ? wrt/(exp*10000)*100 : null; }
  function calcRate(wrt,exp) { const r=calcRateNum(wrt,exp); return r!==null?r.toFixed(2)+'%':'-'; }
  function pctOf(a,b) { return b>0 ? (a/b*100).toFixed(1)+'%' : '-'; }
  function delta(a,b) { return b!==null&&a!==null ? a-b : null; }

  function qoqTag(v, inverse) {
    if(v===null||v===undefined) return '<span style="color:#ccc;font-size:10px;">—</span>';
    const up = inverse ? v<=0 : v>=0;
    const c = up ? '#34a853' : '#ea4335';
    return '<span style="color:'+c+';font-size:11px;font-weight:700;">'+(v>=0?'▲ +':'▼ ')+v.toFixed(1)+'%</span>';
  }
  function deltaTag(v, inverse, unit) {
    if(v===null||v===undefined) return '';
    unit = unit||'pp';
    const up = inverse ? v<=0 : v>=0;
    const c = up ? '#34a853' : '#ea4335';
    return '<span style="color:'+c+';font-size:10px;">'+(v>=0?'+':'')+v.toFixed(1)+unit+'</span>';
  }

  const chs = cd.chData;
  const CHANNELS = ['商业支付','面对面','固定入口','周边','其他'];

  // 汇总数值
  let totExp=0,totWrt=0,ptotExp=0,ptotWrt=0;
  CHANNELS.forEach(c=>{
    totExp+=(chs[c]||{}).exp||0; totWrt+=(chs[c]||{}).wrt||0;
    ptotExp+=(chs[c]||{}).pExp||0; ptotWrt+=(chs[c]||{}).pWrt||0;
  });

  // 二选一合计
  const e2Chs=['商业支付','面对面','固定入口','其他'];
  const s2={exp:0,wrt:0,pExp:0,pWrt:0};
  e2Chs.forEach(c=>{s2.exp+=(chs[c]||{}).exp||0;s2.wrt+=(chs[c]||{}).wrt||0;s2.pExp+=(chs[c]||{}).pExp||0;s2.pWrt+=(chs[c]||{}).pWrt||0;});
  const zbCh = chs['周边']||{};

  const zbShare = totExp>0 ? zbCh.exp/totExp*100 : 0;
  const pZbShare = ptotExp>0 ? zbCh.pExp/ptotExp*100 : 0;
  const zbDelta = zbShare - pZbShare;

  // 诊断标签
  const s2Qoq = qoqVal(s2.exp, s2.pExp);
  const isZbDilution = zbShare > 50 && zbDelta > 5 && (cd.wrtQoq===null||cd.wrtQoq<=0);
  const isEff2x1Low = s2.exp < 5 && totExp > 10;
  const isNearAlive = !isZbDilution && !isEff2x1Low && cd.wrtQoq>0 && cd.survivalRate>=0.7;

  let diagType, diagColor;
  if(isZbDilution){diagType='周边曝光稀释';diagColor='#c62828';}
  else if(isEff2x1Low){diagType='二选一曝光不足';diagColor='#e65100';}
  else if(isNearAlive){diagType='改善中（临界）';diagColor='#1565c0';}
  else{diagType='整体下滑';diagColor='#5c35cc';}

  let out = '';
  out += '<div style="margin-top:14px;border-top:1px dashed #e0e0e0;padding-top:14px;">';

  // 诊断标签
  out += '<div style="margin-bottom:12px;display:flex;align-items:center;gap:8px;">';
  out += '<span style="font-size:11px;font-weight:700;background:'+diagColor+';color:#fff;padding:3px 10px;border-radius:4px;">'+diagType+'</span>';
  out += '<span style="font-size:12px;color:#666;">渠道曝光分配诊断</span></div>';

  // ═══════════════════════════════════════════
  // 分渠道对比表：曝光占比 | 核销占比 | 核销率
  // 每个渠道：本期 vs 上期，变化量高亮
  // ═══════════════════════════════════════════
  const chRows = [
    {name:'商业支付', color:'#1a73e8', bg:'#e8f0fe', isZb:false, anomaly:false},
    {name:'面对面',   color:'#0d7a1a', bg:'#e6f4ea', isZb:false, anomaly:false},
    {name:'固定入口', color:'#5c35cc', bg:'#f0ebff', isZb:false, anomaly:false},
    {name:'周边',     color:'#e65100', bg:'#fff3e0', isZb:true,  anomaly:false},
    {name:'其他',     color:'#888',    bg:'#f5f5f5', isZb:false, anomaly:true},
  ];

  out += '<div style="overflow-x:auto;">';
  out += '<table style="width:100%;border-collapse:collapse;font-size:12px;">';

  // 表头
  out += '<thead>';
  out += '<tr style="background:#f8f9fa;">';
  out += '<th style="padding:8px 10px;text-align:left;font-weight:700;color:#333;border-bottom:2px solid #e0e0e0;min-width:70px;">渠道</th>';
  ['曝光占比','核销占比','曝光核销率'].forEach(h => {
    out += '<th colspan="3" style="padding:8px 10px;text-align:center;font-weight:700;color:#333;border-bottom:2px solid #e0e0e0;border-left:1px solid #e0e0e0;">'+h+'</th>';
  });
  out += '</tr>';
  out += '<tr style="background:#f8f9fa;">';
  out += '<th style="padding:4px 10px;border-bottom:1px solid #e0e0e0;"></th>';
  for(let i=0;i<3;i++){
    out += '<th style="padding:4px 8px;text-align:right;color:#888;font-weight:400;border-left:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0;">本期</th>';
    out += '<th style="padding:4px 8px;text-align:right;color:#bbb;font-weight:400;border-bottom:1px solid #e0e0e0;">上期</th>';
    out += '<th style="padding:4px 8px;text-align:center;color:#888;font-weight:400;border-bottom:1px solid #e0e0e0;">变化</th>';
  }
  out += '</tr>';
  out += '</thead><tbody>';

  chRows.forEach((r,idx) => {
    const d = chs[r.name]||{};
    const hasData = (d.exp||0)+(d.wrt||0)+(d.pExp||0)+(d.pWrt||0) > 0;
    if(!hasData) return;

    const eShare = totExp>0 ? d.exp/totExp*100 : 0;
    const peShare = ptotExp>0 ? d.pExp/ptotExp*100 : 0;
    const wShare = totWrt>0 ? d.wrt/totWrt*100 : 0;
    const pwShare = ptotWrt>0 ? d.pWrt/ptotWrt*100 : 0;
    const rate = calcRateNum(d.wrt, d.exp);
    const prate = calcRateNum(d.pWrt, d.pExp);
    const anomalyRate = r.anomaly && d.exp < 0.1 && (d.wrt||0) > 100;

    const eDelta = eShare - peShare;
    const wDelta = wShare - pwShare;
    const rateDelta = (rate!==null&&prate!==null) ? rate-prate : null;

    const rowBg = idx%2===0 ? '#fff' : '#fafafa';
    out += '<tr style="background:'+rowBg+';border-bottom:1px solid #f0f0f0;">';
    out += '<td style="padding:8px 10px;"><span style="font-weight:700;color:'+r.color+';">'+r.name+'</span>'+(r.isZb?'<br><span style="font-size:10px;color:#e65100;background:#fff3e0;padding:1px 5px;border-radius:3px;">非二选一</span>':'')+(r.anomaly?'<br><span style="font-size:10px;color:#e65100;">⚠数据口径</span>':'')+'</td>';

    // 曝光占比
    out += '<td style="padding:8px;text-align:right;border-left:1px solid #f0f0f0;"><strong style="color:'+(r.isZb&&eShare>40?'#c62828':'#1a1a1a')+'">'+eShare.toFixed(1)+'%</strong></td>';
    out += '<td style="padding:8px;text-align:right;color:#aaa;">'+peShare.toFixed(1)+'%</td>';
    out += '<td style="padding:8px;text-align:center;">'+deltaTag(eDelta, r.isZb)+'</td>';

    // 核销占比
    out += '<td style="padding:8px;text-align:right;border-left:1px solid #f0f0f0;"><strong>'+wShare.toFixed(1)+'%</strong></td>';
    out += '<td style="padding:8px;text-align:right;color:#aaa;">'+pwShare.toFixed(1)+'%</td>';
    out += '<td style="padding:8px;text-align:center;">'+deltaTag(wDelta)+'</td>';

    // 核销率
    if(anomalyRate) {
      out += '<td style="padding:8px;text-align:right;border-left:1px solid #f0f0f0;color:#e65100;font-size:10px;">⚠异常</td>';
      out += '<td style="padding:8px;text-align:right;color:#aaa;">—</td>';
      out += '<td style="padding:8px;"></td>';
    } else {
      out += '<td style="padding:8px;text-align:right;border-left:1px solid #f0f0f0;"><strong style="color:'+(r.isZb?'#e65100':'#1a73e8')+'">'+(rate!==null?rate.toFixed(2)+'%':'-')+'</strong></td>';
      out += '<td style="padding:8px;text-align:right;color:#aaa;">'+(prate!==null?prate.toFixed(2)+'%':'-')+'</td>';
      out += '<td style="padding:8px;text-align:center;">'+deltaTag(rateDelta, r.isZb, 'pp')+'</td>';
    }
    out += '</tr>';
  });

  // 二选一合计行
  const s2eShare = totExp>0 ? s2.exp/totExp*100 : 0;
  const ps2eShare = ptotExp>0 ? s2.pExp/ptotExp*100 : 0;
  const s2wShare = totWrt>0 ? s2.wrt/totWrt*100 : 0;
  const ps2wShare = ptotWrt>0 ? s2.pWrt/ptotWrt*100 : 0;
  const s2Rate = calcRateNum(s2.wrt, s2.exp);
  const ps2Rate = calcRateNum(s2.pWrt, s2.pExp);
  out += '<tr style="background:#dce8fb;font-weight:700;border-top:2px solid #1a73e8;">';
  out += '<td style="padding:8px 10px;color:#1a73e8;">二选一合计</td>';
  out += '<td style="padding:8px;text-align:right;border-left:1px solid #c5d8f5;"><strong>'+s2eShare.toFixed(1)+'%</strong></td>';
  out += '<td style="padding:8px;text-align:right;color:#888;">'+ps2eShare.toFixed(1)+'%</td>';
  out += '<td style="padding:8px;text-align:center;">'+deltaTag(s2eShare-ps2eShare)+'</td>';
  out += '<td style="padding:8px;text-align:right;border-left:1px solid #c5d8f5;"><strong>'+s2wShare.toFixed(1)+'%</strong></td>';
  out += '<td style="padding:8px;text-align:right;color:#888;">'+ps2wShare.toFixed(1)+'%</td>';
  out += '<td style="padding:8px;text-align:center;">'+deltaTag(s2wShare-ps2wShare)+'</td>';
  out += '<td style="padding:8px;text-align:right;border-left:1px solid #c5d8f5;"><strong style="color:#1a73e8;">'+(s2Rate!==null?s2Rate.toFixed(2)+'%':'-')+'</strong></td>';
  out += '<td style="padding:8px;text-align:right;color:#888;">'+(ps2Rate!==null?ps2Rate.toFixed(2)+'%':'-')+'</td>';
  out += '<td style="padding:8px;text-align:center;">'+deltaTag(s2Rate!==null&&ps2Rate!==null?s2Rate-ps2Rate:null)+'</td>';
  out += '</tr>';

  out += '</tbody></table></div>';
  out += '</div>'; // end container
  return out;
}

function toggleSubChDetail(btn) {
  const el = btn.nextElementSibling;
  if(!el) return;
  if(el.style.display==='none'||el.style.display==='') {
    el.style.display='block';
    btn.textContent='▾ 收起子渠道明细';
  } else {
    el.style.display='none';
    btn.textContent='▸ 展开子渠道明细';
  }
}

// === 工具函数 ===
function fmt(n) { if(isNaN(n)||n===null) return '-'; return n>=10000?(n/10000).toFixed(1)+'w':Math.round(n).toLocaleString(); }
function pct(n) { if(isNaN(n)||n===null) return '-'; return (n*100).toFixed(2)+'%'; }
function pctSigned(n) { if(isNaN(n)||n===null) return '-'; return (n>=0?'+':'')+(n*100).toFixed(2)+'%'; }

// === 目标达成柱状图辅助 ===
function buildAchieveBar(label, rate, subText, goodThreshold=0.6, warnThreshold=0.3, qoq=null) {
  const pctVal = Math.min(rate * 100, 100);
  const color = rate>=goodThreshold ? '#34a853' : rate>=warnThreshold ? '#f9ab00' : '#ea4335';
  let qoqHtml = '';
  if(qoq !== null && qoq !== undefined) {
    const qoqColor = qoq >= 0 ? '#34a853' : '#ea4335';
    const qoqSign = qoq >= 0 ? '+' : '';
    qoqHtml = `<span style="font-size:11px;color:${qoqColor};font-weight:600;margin-left:6px;">${qoqSign}${qoq.toFixed(1)}% 环比</span>`;
  }
  return `<div class="achieve-bar-item">
    <div class="ab-label">${label}</div>
    <div class="ab-value" style="color:${color};">${isNaN(rate)||rate===0&&subText==='暂无数据'?'-':(rate*100).toFixed(1)+'%'}${qoqHtml}</div>
    <div class="ab-track"><div class="ab-fill" style="width:${pctVal}%;background:${color};"></div></div>
    <div class="ab-sub">${subText}</div>
  </div>`;
}
function tagRate(r) {
  if(isNaN(r)) return '<span class="tag tag-gray">-</span>';
  const p = (r*100).toFixed(1);
  if(r>=0.8) return `<span class="tag tag-green">${p}%</span>`;
  if(r>=0.4) return `<span class="tag tag-yellow">${p}%</span>`;
  return `<span class="tag tag-red">${p}%</span>`;
}
function encId(s) { return btoa(unescape(encodeURIComponent(s))).replace(/[+/=]/g,'_'); }
function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function escAttr(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
init();
</script>
