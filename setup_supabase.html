const DATA_DATE = "2026-03-17";

function log(msg, type='info') {
  const el = document.getElementById('log');
  const span = document.createElement('span');
  span.className = type;
  span.textContent = msg + '\n';
  el.appendChild(span);
  el.scrollTop = el.scrollHeight;
}

async function run() {
  const url = document.getElementById('url').value.trim();
  const key = document.getElementById('key').value.trim();
  if(!url || !key) { alert('请填写 URL 和 Key'); return; }

  document.getElementById('btn').disabled = true;
  document.getElementById('log').innerHTML = '';
  
  const supabase = window.supabase.createClient(url, key);
  
  log('🔌 连接 Supabase...', 'info');

  // 建表：通过插入空数据触发错误来检测表是否存在，然后用 upsert
  // 实际建表需要用 SQL，通过 rpc 调用
  // 先尝试直接插入数据（表已建好的情况）
  log('📊 开始导入品牌数据（' + BRANDS.length + ' 条）...', 'info');
  
  // 分批插入，每批 20 条
  const batchSize = 20;
  
  // 品牌数据
  let errors = 0;
  for(let i = 0; i < BRANDS.length; i += batchSize) {
    const batch = BRANDS.slice(i, i + batchSize);
    const { error } = await supabase.from('ka_brands').upsert(batch, { onConflict: 'name' });
    if(error) {
      log('  ❌ 品牌批次 ' + i + ': ' + error.message, 'err');
      errors++;
    } else {
      log('  ✅ 品牌 ' + (i+1) + '~' + Math.min(i+batchSize, BRANDS.length) + ' 导入成功', 'ok');
    }
  }

  // 活动数据
  log('📋 开始导入活动数据（' + ACTIVITIES.length + ' 条）...', 'info');
  for(let i = 0; i < ACTIVITIES.length; i += batchSize) {
    const batch = ACTIVITIES.slice(i, i + batchSize);
    const { error } = await supabase.from('ka_activities').insert(batch);
    if(error) {
      log('  ❌ 活动批次 ' + i + ': ' + error.message, 'err');
      errors++;
    } else {
      log('  ✅ 活动 ' + (i+1) + '~' + Math.min(i+batchSize, ACTIVITIES.length) + ' 导入成功', 'ok');
    }
  }

  // 负责人分配数据
  log('👥 开始导入负责人分配数据（' + ASSIGNMENTS.length + ' 条）...', 'info');
  const { error: ae } = await supabase.from('ka_assignments').upsert(ASSIGNMENTS, { onConflict: 'brand' });
  if(ae) { log('  ❌ 分配数据: ' + ae.message, 'err'); errors++; }
  else { log('  ✅ 分配数据导入成功', 'ok'); }

  // 整体指标
  log('📈 导入整体指标...', 'info');
  const overallRow = { ...OVERALL, data_date: DATA_DATE };
  const { error: oe } = await supabase.from('ka_overall').insert(overallRow);
  if(oe) { log('  ❌ 整体指标: ' + oe.message, 'err'); errors++; }
  else { log('  ✅ 整体指标导入成功', 'ok'); }

  if(errors === 0) {
    log('\n🎉 全部完成！数据已成功导入 Supabase', 'ok');
    log('\n下一步：', 'info');
    log('  1. 在 dashboard_supabase.html 里填入你的 URL 和 anon key', 'info');
    log('  2. 部署到 Vercel，发链接给团队', 'info');
  } else {
    log('\n⚠️ 完成，但有 ' + errors + ' 个错误（可能是表还没建好）', 'err');
    log('请先在 Supabase SQL Editor 里建表，然后重试', 'err');
  }
  
  document.getElementById('btn').disabled = false;
}
