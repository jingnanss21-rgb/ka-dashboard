function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function run() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  log('🔍 检查表是否存在...');

  // 1. 尝试读取表（判断是否存在）
  const { error: checkErr } = await sb.from('ka_surprise_goods').select('id').limit(1);
  
  if(checkErr && checkErr.code === 'PGRST116') {
    // 表不存在，需要用 SQL Editor 手动建
    log('⚠️ 表 ka_surprise_goods 不存在，正在通过 RPC 创建...', 'warn');
  }

  // 2. 先尝试删除旧数据
  const { error: delErr } = await sb.from('ka_surprise_goods').delete().neq('id', 0);
  if(delErr) {
    if(delErr.code === 'PGRST116' || delErr.message.includes('does not exist') || delErr.message.includes('schema cache')) {
      log('📋 表不存在，请先在 Supabase SQL Editor 执行建表 SQL！', 'err');
      log('👉 建表 SQL 已在下方显示，复制到 <a href="https://supabase.com/dashboard/project/imogeucpwfburswopykq/editor" target="_blank">SQL Editor</a> 执行后再重试', 'warn');
      document.getElementById('sql-section').style.display='block';
      btn.disabled = false;
      return;
    }
    log('清空旧数据时出错: ' + delErr.message, 'warn');
  } else {
    log('✅ 已清空旧数据');
  }

  // 3. 分批插入
  log('📥 开始插入 ' + DATA.length + ' 条记录...');
  const batchSize = 20;
  let inserted = 0;
  for(let i=0; i<DATA.length; i+=batchSize) {
    const batch = DATA.slice(i, i+batchSize);
    const { error: insErr } = await sb.from('ka_surprise_goods').insert(batch);
    if(insErr) {
      log('❌ 插入失败 (第' + (i+1) + '批): ' + insErr.message, 'err');
      btn.disabled = false;
      return;
    }
    inserted += batch.length;
    log('✅ 已插入 ' + inserted + ' / ' + DATA.length + ' 条');
  }

  log('🎉 全部完成！共导入 ' + inserted + ' 条惊喜货盘数据', 'ok');
  log('👉 可以刷新 Dashboard 查看新数据了', 'ok');
  btn.textContent = '✅ 导入完成';
}

  <textarea style="width:100%;height:180px;font-family:monospace;font-size:12px;padding:12px;border:1px solid #ddd;border-radius:8px;" readonly>CREATE TABLE IF NOT EXISTS ka_surprise_goods (
